apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: firefly-iii
  namespace: firefly-iii
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: ingress
  hostnames:
    - budget.elposhox.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: firefly-iii
          port: 80
