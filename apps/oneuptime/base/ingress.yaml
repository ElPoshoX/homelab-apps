apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oneuptime
  namespace: oneuptime
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: ingress
  hostnames:
    - uptime.elposhox.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: oneuptime-nginx
          port: 80
          weight: 1
