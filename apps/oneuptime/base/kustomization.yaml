apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply labels to all resources
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: oneuptime
  homelab.local/OwnedBy: ElPoshoX

# Namespace for all resources
namespace: oneuptime

# Helm chart as a resource
# Official OneUptime Helm repository: https://helm-chart.oneuptime.com/
helmCharts:
  - name: oneuptime
    repo: https://helm-chart.oneuptime.com
    releaseName: oneuptime
    version: "10.0.34"
    valuesFile: values.yaml
    namespace: oneuptime

# Additional Kubernetes resources (non-Helm)
resources:
  - namespace.yaml
  - pvc.yaml
  - ingress.yaml
  - secret.yaml

# Patch Helm chart Deployments to inject database credentials from SOPS secret
patchesJson6902:
  # Inject secret as environment variables into app deployment
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: oneuptime-app
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value:
          - secretRef:
              name: oneuptime-secret
  # Inject secret into home deployment
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: oneuptime-home
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value:
          - secretRef:
              name: oneuptime-secret
  # Inject secret into worker deployment
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: oneuptime-worker
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value:
          - secretRef:
              name: oneuptime-secret
  # Inject secret into telemetry deployment
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: oneuptime-telemetry
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value:
          - secretRef:
              name: oneuptime-secret
