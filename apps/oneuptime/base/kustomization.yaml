apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply labels to all resources except CRDs
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: oneuptime
      homelab.local/OwnedBy: ElPoshoX

# Namespace for all resources
namespace: oneuptime

# Helm chart as a resource
# Official OneUptime Helm repository: https://helm-chart.oneuptime.com/
helmCharts:
  - name: oneuptime
    repo: https://helm-chart.oneuptime.com
    releaseName: oneuptime
    version: "10.0.34"
    valuesFile: values.yaml
    namespace: oneuptime
    skipTests: true

# Additional Kubernetes resources (non-Helm)
resources:
  - namespace.yaml
  - pvc.yaml
  - ingress.yaml
  - secret.yaml

# Note: The new labels API doesn't apply labels to CustomResourceDefinitions by default,
# preventing the annotation overflow issue with KEDA CRDs that have large OpenAPI schemas
