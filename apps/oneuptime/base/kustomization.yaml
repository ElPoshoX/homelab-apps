apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply labels to all resources
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: oneuptime
  homelab.local/OwnedBy: ElPoshoX

# Namespace for all resources
namespace: oneuptime

# Helm chart as a resource
# Official OneUptime Helm repository: https://helm-chart.oneuptime.com/
helmCharts:
  - name: oneuptime
    repo: https://helm-chart.oneuptime.com
    releaseName: oneuptime
    version: "10.0.34"
    valuesFile: values.yaml
    namespace: oneuptime
    skipTests: true

# Additional Kubernetes resources (non-Helm)
resources:
  - namespace.yaml
  - pvc.yaml
  - ingress.yaml
  - secret.yaml

# Remove commonLabels from KEDA CRDs to prevent annotation size overflow
# KEDA CRDs have very large OpenAPI schemas; adding labels pushes them over 262KB limit
patchesJson6902:
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: scaledjobs.keda.sh
    patch: |-
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1managed-by
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1part-of
      - op: remove
        path: /metadata/labels/homelab.local~1OwnedBy
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: scaledobjects.keda.sh
    patch: |-
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1managed-by
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1part-of
      - op: remove
        path: /metadata/labels/homelab.local~1OwnedBy
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: triggerauthentications.keda.sh
    patch: |-
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1managed-by
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1part-of
      - op: remove
        path: /metadata/labels/homelab.local~1OwnedBy
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: clustertriggerauthentications.keda.sh
    patch: |-
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1managed-by
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1part-of
      - op: remove
        path: /metadata/labels/homelab.local~1OwnedBy
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: cloudeventsources.eventing.keda.sh
    patch: |-
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1managed-by
      - op: remove
        path: /metadata/labels/app.kubernetes.io~1part-of
      - op: remove
        path: /metadata/labels/homelab.local~1OwnedBy
