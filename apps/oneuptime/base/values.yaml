# OneUptime Helm Chart Configuration
# Using external databases on TrueNAS

global:
  storageClass: longhorn
  clusterDomain: cluster.local

# Deployment Configuration
host: uptime.elposhox.dev
httpProtocol: https

# Image registry
image:
  registry: docker.io
  pullPolicy: IfNotPresent

# Deployment replicas
deployment:
  replicaCount: 1

# Disable internal databases - use external on TrueNAS
postgresql:
  enabled: false

redis:
  enabled: false

clickhouse:
  enabled: false

# External PostgreSQL Configuration
externalPostgres:
  host: oneuptime-postgres.elposhox.dev
  port: 30200
  username: poshox
  database: oneuptime
  existingSecret:
    name: oneuptime-secret
    passwordKey: POSTGRES_PASSWORD

# External Redis Configuration
externalRedis:
  host: oneuptime-redis.elposhox.dev
  port: 30201
  existingSecret:
    name: oneuptime-secret
    passwordKey: REDIS_PASSWORD

# External ClickHouse Configuration
externalClickhouse:
  host: oneuptime-clickhouse.elposhox.dev
  port: 443
  username: poshox
  existingSecret:
    name: oneuptime-secret
    passwordKey: CLICKHOUSE_PASSWORD

# Disable internal nginx - we use Cilium Gateway HTTPRoute
nginx:
  enabled: false

# Core Services
home:
  enabled: true
  replicaCount: 1

app:
  enabled: true
  replicaCount: 1

worker:
  enabled: true
  replicaCount: 1

telemetry:
  enabled: true
  replicaCount: 1

# Optional services - disable for minimal homelab setup
testServer:
  enabled: false

aiAgent:
  enabled: false

# Node affinity and tolerations
affinity: {}
tolerations: []
