apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: tempo
      homelab.local/OwnedBy: ElPoshoX

namespace: tempo

helmCharts:
  - name: tempo
    repo: https://grafana-community.github.io/helm-charts
    releaseName: tempo
    valuesFile: values.yaml
    namespace: tempo

resources:
  - namespace.yaml
  - secret.yaml

patches:
  - target:
      kind: StatefulSet
      name: tempo
    patch: |-
      - op: add
        path: /spec/revisionHistoryLimit
        value: 10
      - op: add
        path: /spec/podManagementPolicy
        value: OrderedReady
      - op: add
        path: /spec/persistentVolumeClaimRetentionPolicy
        value:
          whenDeleted: Retain
          whenScaled: Retain
