# Tempo Helm Chart Configuration
# Distributed tracing backend for homelab observability stack
# Monolithic deployment mode (single pod)

# Image configuration
image:
  repository: grafana/tempo
  pullPolicy: IfNotPresent

# Tempo mode - monolithic for simple single-pod deployment
mode: monolithic

# Replicas for monolithic mode
replicas: 1

# Service configuration
service:
  type: ClusterIP
  port: 3100
  annotations: {}

# Persistence configuration (30GB Longhorn PVC for traces)
persistence:
  enabled: true
  storageClassName: longhorn
  size: 30Gi
  accessModes:
    - ReadWriteOnce

# Resource requests and limits
resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Ingress configuration
ingress:
  enabled: false

# DNS hostname for internal communication
hostname: tempo.elposhox.dev

# Tempo configuration
tempo:
  # Receiver configuration for OTLP protocol
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_http:
          endpoint: 0.0.0.0:14268

  # Querier configuration
  querier:
    max_concurrent_queries: 20

  # Query frontend configuration
  query_frontend:
    max_cache_freshness_ms: 300000

  # Storage configuration - S3 backend (Garage)
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-bucket
        endpoint: garage:9000
        insecure: true
        access_key: ${S3_ACCESS_KEY}
        secret_key: ${S3_SECRET_KEY}

  # Metrics generation
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://mimir:9009/api/prom/push
    ring:
      kvstore:
        store: inmemory

  # Trace retention - 7 days
  retention: 168h

  # Distributor configuration
  distributor:
    rate_limit_bytes: 10485760  # 10MB/s
    log_received_traces: false

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /status
    port: 3100
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /status
    port: 3100
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

# Node affinity - prefer worker nodes, avoid CP2
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-role.kubernetes.io/worker
              operator: In
              values:
                - "true"
      - weight: 50
        preference:
          matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: NotIn
              values:
                - "true"
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
                - CP2

# Pod security context
podSecurityContext:
  fsGroup: 472
  runAsUser: 472
  runAsNonRoot: true

# Security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# RBAC
rbac:
  pspEnabled: false

# Service account
serviceAccount:
  create: true
  name: tempo
  annotations: {}
