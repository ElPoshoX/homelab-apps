global:
  commonLabels: {}
  imageRegistry: null

nameOverride: ""
fullnameOverride: ""

replicas: 1

labels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: tempo
  homelab.local/OwnedBy: ElPoshoX

annotations: {}

tempo:
  registry: docker.io
  repository: grafana/tempo
  tag: ""
  pullPolicy: IfNotPresent

  updateStrategy: RollingUpdate
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  memBallastSizeMbs: 1024
  multitenancyEnabled: false
  reportingEnabled: false

  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://prometheus:9090/api/v1/write"
    processor: {}
    registry: {}
    storage:
      path: "/var/tempo/metrics"
      remote_write: []
    traces_storage:
      path: "/var/tempo/traces"

  ingester: {}
  querier:
    max_concurrent_queries: 20
  queryFrontend: {}

  retention: 168h

  overrides:
    defaults: {}
    per_tenant_override_config: /conf/overrides.yaml
  per_tenant_overrides: {}

  server:
    http_listen_port: 3200

  livenessProbe:
    httpGet:
      path: /ready
      port: 3200
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    httpGet:
      path: /ready
      port: 3200
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-bucket
        endpoint: garage.garage.svc.cluster.local:3900
        access_key: ${TEMPO_S3_ACCESS_KEY_ID}
        secret_key: ${TEMPO_S3_SECRET_ACCESS_KEY}
        insecure: true
      wal:
        path: /var/tempo/wal

  receivers:
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_binary:
          endpoint: 0.0.0.0:6832
        thrift_compact:
          endpoint: 0.0.0.0:6831
        thrift_http:
          endpoint: 0.0.0.0:14268
    opencensus:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
    zipkin:
      endpoint: 0.0.0.0:9411

  securityContext: {}

  extraArgs:
    config.expand-env: "true"

  extraEnv: []

  extraEnvFrom:
    - secretRef:
        name: tempo-s3-credentials

  extraVolumeMounts: []

config: |
  memberlist:
    cluster_label: "{{ .Release.Name }}.{{ .Release.Namespace }}"
  multitenancy_enabled: {{ .Values.tempo.multitenancyEnabled }}
  usage_report:
    reporting_enabled: {{ .Values.tempo.reportingEnabled }}
  compactor:
    compaction:
      block_retention: {{ .Values.tempo.retention }}
  distributor:
    receivers:
      {{- toYaml .Values.tempo.receivers | nindent 8 }}
  ingester:
    {{- toYaml .Values.tempo.ingester | nindent 6 }}
  server:
    {{- toYaml .Values.tempo.server | nindent 6 }}
  storage:
    {{- toYaml .Values.tempo.storage | nindent 6 }}
  querier:
    {{- toYaml .Values.tempo.querier | nindent 6 }}
  query_frontend:
    {{- toYaml .Values.tempo.queryFrontend | nindent 6 }}
  overrides:
    {{- toYaml .Values.tempo.overrides | nindent 6 }}
    {{- if .Values.tempo.metricsGenerator.enabled }}
  metrics_generator:
    {{- if .Values.tempo.metricsGenerator.processor }}
    processor:
      {{- toYaml .Values.tempo.metricsGenerator.processor | nindent 8 }}
    {{- end }}
    {{- if .Values.tempo.metricsGenerator.registry }}
    registry:
      {{- toYaml .Values.tempo.metricsGenerator.registry | nindent 8 }}
    {{- end }}
    storage:
      path: {{ .Values.tempo.metricsGenerator.storage.path | quote }}
      {{- if .Values.tempo.metricsGenerator.storage.remote_write }}
      remote_write:
        {{- toYaml .Values.tempo.metricsGenerator.storage.remote_write | nindent 10 }}
      {{- else }}
      remote_write:
        - url: {{ .Values.tempo.metricsGenerator.remoteWriteUrl }}
      {{- end }}
    traces_storage:
      path: {{ .Values.tempo.metricsGenerator.traces_storage.path | quote }}
    {{- end }}

tempoQuery:
  repository: grafana/tempo-query
  tag: null
  pullPolicy: IfNotPresent
  enabled: false
  service:
    port: 16686
  ingress:
    enabled: false
    annotations: {}
    labels: {}
    path: /
    pathType: Prefix
    hosts:
      - query.tempo.example.com
    extraPaths: []
    tls: []
  resources: {}
  extraArgs: {}
  extraEnv: []
  extraVolumeMounts: []
  securityContext: {}

securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true

serviceAccount:
  create: true
  name: null
  imagePullSecrets: []
  annotations: {}
  labels: {}
  automountServiceAccountToken: true

service:
  type: ClusterIP
  clusterIP: ""
  loadBalancerIP: null
  protocol: "TCP"
  annotations: {}
  labels: {}
  targetPort: ""

serviceMonitor:
  enabled: false
  interval: ""
  additionalLabels: {}
  annotations: {}

persistence:
  enabled: true
  enableStatefulSetAutoDeletePVC: false
  storageClassName: longhorn
  accessModes:
    - ReadWriteMany
  size: 30Gi

podAnnotations: {}
podLabels: {}
extraLabels: {}
extraVolumes: []

nodeSelector: {}
tolerations: []
affinity: {}

priorityClassName: null
hostAliases: []

networkPolicy:
  enabled: false
  ingress: true
  allowExternal: true
  explicitNamespacesSelector: {}
  egress:
    enabled: false
    blockDNSResolution: false
    ports: []
    to: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1

rbac:
  create: true
