# Tempo Helm Chart Configuration (grafana-community)
# Distributed tracing backend for homelab observability stack
# Monolithic deployment mode (single pod with S3 Garage backend)

# Global settings
replicas: 1

# Image configuration
tempo:
  registry: docker.io
  repository: grafana/tempo
  pullPolicy: IfNotPresent

  # Memory ballast for reducing GC pressure
  memBallastSizeMbs: 1024

  # Multitenancy disabled for single-tenant homelab
  multitenancyEnabled: false

  # Reporting disabled for privacy
  reportingEnabled: false

  # Metrics generator - send metrics to Mimir
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://mimir.mimir.svc.cluster.local:9009/api/prom/push
    storage:
      path: /var/tempo/metrics
    traces_storage:
      path: /var/tempo/traces

  # Resource requests and limits
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # HTTP server configuration
  server:
    http_listen_port: 3200

  # Liveness probe - checks if pod is alive
  livenessProbe:
    httpGet:
      path: /ready
      port: 3200
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Readiness probe - checks if pod is ready to accept traffic
  readinessProbe:
    httpGet:
      path: /ready
      port: 3200
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # Storage configuration - S3 Garage backend with environment variable expansion
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-bucket
        endpoint: garage.garage.svc.cluster.local:3900
        access_key: ${TEMPO_S3_ACCESS_KEY_ID}
        secret_key: ${TEMPO_S3_SECRET_ACCESS_KEY}
        insecure: true
      wal:
        path: /var/tempo/wal

  # Receivers for all tracing protocols
  receivers:
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_binary:
          endpoint: 0.0.0.0:6832
        thrift_compact:
          endpoint: 0.0.0.0:6831
        thrift_http:
          endpoint: 0.0.0.0:14268
    opencensus:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411

  # Querier configuration
  querier:
    max_concurrent_queries: 20

  # Query frontend configuration
  queryFrontend:
    max_cache_freshness_ms: 300000

  # Distributor configuration - rate limiting
  distributor:
    rate_limit_bytes: 10485760  # 10MB/s
    log_received_traces: false

  # Retention policy - 7 days
  retention: 168h

  # Enable environment variable expansion in configuration
  extraArgs:
    config.expand-env: "true"

  # Environment variables from Kubernetes Secrets
  extraEnvFrom:
    - secretRef:
        name: tempo-s3-credentials

  # Container security context - minimal restrictions per chart defaults
  securityContext: {}

# Service account configuration
serviceAccount:
  create: true
  name: tempo

# Service configuration
service:
  type: ClusterIP
  protocol: TCP
  annotations: {}

# Persistence configuration - 30GB PVC for traces on Longhorn
persistence:
  enabled: true
  storageClassName: longhorn
  size: 30Gi
  accessModes:
    - ReadWriteMany

# Pod security context
podSecurityContext:
  fsGroup: 10001
  runAsUser: 10001
  runAsNonRoot: true

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# RBAC configuration
rbac:
  create: true
  pspEnabled: false

# Labels for all resources
labels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: tempo
  homelab.local/OwnedBy: ElPoshoX

# Annotations for StatefulSet
annotations: {}

# Node selector for pod placement
nodeSelector: {}

# Tolerations for pod placement
tolerations: []

# Affinity rules for pod placement
affinity: {}

# Ingress disabled - using Cilium Gateway HTTPRoute instead
ingress:
  enabled: false
