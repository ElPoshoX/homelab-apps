# Tempo Helm Chart Configuration
# Distributed tracing backend for homelab observability stack
# Monolithic deployment mode (single pod)
# Configured with S3 Garage backend and secure credential injection via SOPS

# Image configuration
image:
  repository: grafana/tempo
  pullPolicy: IfNotPresent

# Tempo mode - monolithic for simple single-pod deployment
mode: monolithic

# Replicas for monolithic mode
replicas: 1

# StatefulSet configuration
statefulSet:
  revisionHistoryLimit: 10
  podManagementPolicy: OrderedReady
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

# Service configuration
service:
  type: ClusterIP
  port: 3100
  annotations: {}

# Persistence configuration (30GB Longhorn PVC for traces)
persistence:
  enabled: true
  storageClassName: longhorn
  size: 30Gi
  accessModes:
    - ReadWriteMany

# Container ports configuration
containerPorts:
  prom:
    name: prom-metrics
    containerPort: 3200
    protocol: TCP
  jaegerThriftCompact:
    name: jaeger-thrift-c
    containerPort: 6831
    protocol: UDP
  jaegerThriftBinary:
    name: jaeger-thrift-b
    containerPort: 6832
    protocol: UDP
  jaegerThriftHttp:
    name: jaeger-thrift-h
    containerPort: 14268
    protocol: TCP
  jaegerGrpc:
    name: jaeger-grpc
    containerPort: 14250
    protocol: TCP
  zipkin:
    name: zipkin
    containerPort: 9411
    protocol: TCP
  otlpLegacy:
    name: otlp-legacy
    containerPort: 55680
    protocol: TCP
  otlpGrpc:
    name: otlp-grpc
    containerPort: 4317
    protocol: TCP
  otlpHttpLegacy:
    name: otlp-httplegacy
    containerPort: 55681
    protocol: TCP
  otlpHttp:
    name: otlp-http
    containerPort: 4318
    protocol: TCP
  opencensus:
    name: opencensus
    containerPort: 55678
    protocol: TCP

# Resource requests and limits
resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Ingress configuration
ingress:
  enabled: false

# DNS hostname for internal communication
hostname: tempo.elposhox.dev

# Tempo configuration
tempo:
  # Receiver configuration for OTLP protocol
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_http:
          endpoint: 0.0.0.0:14268

  # Querier configuration
  querier:
    max_concurrent_queries: 20

  # Query frontend configuration
  query_frontend:
    max_cache_freshness_ms: 300000

  # Storage configuration - S3 backend (Garage)
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-bucket
        endpoint: garage.garage.svc.cluster.local:3900
        insecure: true
        access_key: ${TEMPO_S3_ACCESS_KEY_ID}
        secret_key: ${TEMPO_S3_SECRET_ACCESS_KEY}

  # Metrics generation
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://mimir.mimir.svc.cluster.local:9009/api/prom/push
    ring:
      kvstore:
        store: inmemory

  # Trace retention - 7 days
  retention: 168h

  # Distributor configuration
  distributor:
    rate_limit_bytes: 10485760  # 10MB/s
    log_received_traces: false

  # Enable environment variable expansion in configuration
  extraArgs:
    config.expand-env: "true"

  # Environment variables from Kubernetes Secrets
  extraEnvFrom:
    - secretRef:
        name: tempo-s3-credentials

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /ready
    port: 3200
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /ready
    port: 3200
    scheme: HTTP
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# Pod security context
podSecurityContext:
  fsGroup: 10001
  runAsUser: 10001
  runAsGroup: 10001
  runAsNonRoot: true

# Security context - matches grafana-community chart defaults
securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# RBAC
rbac:
  pspEnabled: false

# Service account
serviceAccount:
  create: true
  name: tempo
  annotations: {}
