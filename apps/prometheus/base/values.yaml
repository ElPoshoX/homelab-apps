# prometheus-community Prometheus Helm Chart v28.14.0
# Configuration for Prometheus, Alertmanager, and related components

## RBAC configuration
rbac:
  create: true

## Service accounts
serviceAccounts:
  server:
    create: true
    name: prometheus

## Prometheus Server Configuration
server:
  ## Name of the server component
  name: server

  ## Pod management policy for StatefulSet
  statefulSetNameOverride: ""

  ## Global defaults
  global:
    scrape_interval: 15s
    scrape_timeout: 10s
    evaluation_interval: 15s

  ## Prometheus data persistence
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 50Gi
    storageClass: longhorn
    annotations: {}
    labels: {}

  ## Retention settings
  retention: "15d"

  ## Resource configuration
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 300m
      memory: 512Mi

  ## Service configuration
  service:
    annotations: {}
    labels: {}
    clusterIP: ""
    externalPort: 80
    internalPort: 9090
    type: ClusterIP
    # httpPort: 80

  ## Pod annotations and labels
  podAnnotations: {}
  podLabels: {}

  ## Pod security context
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  ## Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  ## Prometheus configuration file (ConfigMap)
  configMapOverrideName: ""
  logLevel: info

  ## Server replicas (for HA setup, typically 1)
  replicaCount: 1

## AlertManager Configuration
alertmanager:
  ## Enable AlertManager
  enabled: true

  ## AlertManager persistence
  persistence:
    enabled: true
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    annotations: {}
    labels: {}

  ## AlertManager pod security context
  podSecurityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  ## AlertManager resource configuration
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  ## AlertManager service
  service:
    annotations: {}
    labels: {}
    clusterIP: ""
    externalPort: 80
    internalPort: 9093
    type: ClusterIP

  ## AlertManager pod annotations
  podAnnotations: {}
  podLabels: {}

## kube-state-metrics sub-chart
kubeStateMetrics:
  enabled: true

## prometheus-node-exporter sub-chart
nodeExporter:
  enabled: true

## prometheus-pushgateway sub-chart
pushgateway:
  enabled: true

## Service Monitor configuration (for Prometheus Operator)
serviceMonitorsSelector: {}
# Uncomment to use:
# serviceMonitorsSelector:
#   matchLabels:
#     prometheus: homelab

## Prometheus Server Files (prometheus.yml configuration)
serverFiles:
  prometheus.yml:
    scrape_configs:
      # Kubernetes API Server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Kubernetes Nodes (kubelet metrics)
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Kubernetes cAdvisor (Container metrics - REQUIRED FOR DASHBOARD 315)
      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        metric_relabel_configs:
          - action: drop
            regex: 'container_memory_failures_total'
            source_labels: [__name__]

      # Kubernetes Service Endpoints
      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
            action: replace
            target_label: __scheme__
            regex: (https?)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: kubernetes_name

      # Kubernetes Pods
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
