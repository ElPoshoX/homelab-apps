# Prometheus Helm Chart Configuration
# Time-series metrics collection and storage for homelab observability stack
# Single-replica deployment with S3 (Garage) long-term storage backend

# Global configuration
global:
  scrapeInterval: 15s
  evaluationInterval: 15s

# Prometheus image
image:
  repository: prom/prometheus
  pullPolicy: IfNotPresent
  tag: "" # Latest version

# Replicas
replicas: 1

# Prometheus configuration
prometheus:
  # Pod management
  podManagementPolicy: OrderedReady

  # Retention policy - keep 15 days in local storage
  retention: 15d

  # WAL (Write-Ahead Log) configuration for reliability
  walCompression: true

  # Resource requests and limits
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Service configuration
service:
  type: ClusterIP
  port: 9090
  targetPort: 9090

# Storage configuration - persistent volume for time-series data
persistence:
  enabled: true
  storageClassName: longhorn
  size: 50Gi
  accessModes:
    - ReadWriteOnce

# Security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /-/healthy
    port: 9090
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /-/ready
    port: 9090
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

# Pod disruption budget for availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Scrape configurations - defined via ServiceMonitor resources (not inline)
# This allows dynamic service discovery in Kubernetes
scrapeConfigs: []

# Service Monitor selector - discover ServiceMonitor resources for scraping
serviceMonitorSelector:
  matchLabels:
    prometheus: homelab

# Alerting rules - empty, will be added via PrometheusRule resources
alerting:
  alertmanagers: []

# Rules configuration - empty, will be added via PrometheusRule resources
ruleFiles: {}

# Environment variables for S3 backend credentials
env:
  - name: PROMETHEUS_S3_BUCKET
    value: prometheus-bucket
  - name: PROMETHEUS_S3_ENDPOINT
    value: garage.garage.svc.cluster.local:9000
  - name: PROMETHEUS_S3_INSECURE
    value: "true"

# S3 credentials from Kubernetes secret
envFrom:
  - secretRef:
      name: prometheus-s3-credentials

# RBAC
rbac:
  create: true

# Service account
serviceAccount:
  create: true
  name: prometheus

# Ingress (disabled - using HTTPRoute)
ingress:
  enabled: false

# Network policy
networkPolicy:
  enabled: false
