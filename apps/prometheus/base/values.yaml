# prometheus-community Prometheus Helm Chart v28.14.0
# Configuration for Prometheus, Alertmanager, and related components

## RBAC configuration
rbac:
  create: true

## Service accounts
serviceAccounts:
  server:
    create: true
    name: prometheus

## Prometheus Server Configuration
server:
  ## Name of the server component
  name: server

  ## Pod management policy for StatefulSet
  statefulSetNameOverride: ""

  ## Global defaults
  global:
    scrape_interval: 15s
    scrape_timeout: 10s
    evaluation_interval: 15s

  ## Prometheus data persistence
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 50Gi
    storageClass: longhorn
    annotations: {}
    labels: {}

  ## Retention settings
  retention: "15d"

  ## Resource configuration
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 300m
      memory: 512Mi

  ## Service configuration
  service:
    annotations: {}
    labels: {}
    clusterIP: ""
    externalPort: 80
    internalPort: 9090
    type: ClusterIP
    # httpPort: 80

  ## Pod annotations and labels
  podAnnotations: {}
  podLabels: {}

  ## Pod security context
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  ## Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  ## Prometheus configuration file (ConfigMap)
  configMapOverrideName: ""
  logLevel: info

  ## Server replicas (for HA setup, typically 1)
  replicaCount: 1

## AlertManager Configuration
alertmanager:
  ## Enable AlertManager
  enabled: true

  ## AlertManager persistence
  persistence:
    enabled: true
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    annotations: {}
    labels: {}

  ## AlertManager pod security context
  podSecurityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  ## AlertManager resource configuration
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  ## AlertManager service
  service:
    annotations: {}
    labels: {}
    clusterIP: ""
    externalPort: 80
    internalPort: 9093
    type: ClusterIP

  ## AlertManager pod annotations
  podAnnotations: {}
  podLabels: {}

## kube-state-metrics sub-chart
kubeStateMetrics:
  enabled: true

## prometheus-node-exporter sub-chart
nodeExporter:
  enabled: true

## prometheus-pushgateway sub-chart
pushgateway:
  enabled: true

## Service Monitor configuration (for Prometheus Operator)
serviceMonitorsSelector: {}
# Uncomment to use:
# serviceMonitorsSelector:
#   matchLabels:
#     prometheus: homelab
