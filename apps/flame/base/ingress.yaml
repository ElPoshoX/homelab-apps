apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flame
  namespace: sambda
  annotations:
    flame.pawelmalak/type: application
    flame.pawelmalak/name: AdGuard
    flame.pawelmalak/url: https://adguard.elposhox.dev
    flame.pawelmalak/icon: kubernetes
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`flame.elposhox.dev`)
    services:
    - kind: Service
      name: flame
      port: 5005

