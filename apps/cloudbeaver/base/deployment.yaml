apiVersion: v1
kind: Service
metadata:
  name: cloudbeaver
  labels:
    app.kubernetes.io/name: cloudbeaver
spec:
  selector:
    app.kubernetes.io/name: cloudbeaver
  ports:
    - name: http
      port: 8978
      targetPort: 8978
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  labels:
    app.kubernetes.io/name: cloudbeaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudbeaver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudbeaver
    spec:
      securityContext:
        runAsUser: 8978
        runAsGroup: 8978
        fsGroup: 8978
        runAsNonRoot: true
      containers:
        - name: cloudbeaver
          image: dbeaver/cloudbeaver:26.0.5
          ports:
            - containerPort: 8978
              name: http
          volumeMounts:
            - name: workspace
              mountPath: /opt/cloudbeaver/workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /status
              port: 8978
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: 8978
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cloudbeaver-workspace
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloudbeaver-workspace
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
