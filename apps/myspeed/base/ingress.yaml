apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: myspeed
  namespace: myspeed
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: ingress
  hostnames:
    - speedtest.elposhox.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: myspeed
          port: 80
          weight: 1
