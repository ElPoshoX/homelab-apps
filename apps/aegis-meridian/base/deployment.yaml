apiVersion: v1
kind: Service
metadata:
  name: meridian
  labels:
    app.kubernetes.io/name: meridian
spec:
  selector:
    app.kubernetes.io/name: meridian
  ports:
    - name: http
      port: 3456
      targetPort: 3456
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meridian
  labels:
    app.kubernetes.io/name: meridian
    app.kubernetes.io/version: "1.42.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meridian
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meridian
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /home/claude/.claude /home/claude/.config/meridian /home/claude/.cache/meridian"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: claude-auth
              mountPath: /home/claude/.claude
            - name: meridian-config
              mountPath: /home/claude/.config/meridian
            - name: meridian-cache
              mountPath: /home/claude/.cache/meridian
      containers:
        - name: meridian
          image: ghcr.io/rynfar/meridian:latest
          ports:
            - containerPort: 3456
              name: http
          env:
            - name: MERIDIAN_PORT
              value: "3456"
            - name: MERIDIAN_HOST
              value: "0.0.0.0"
            - name: MERIDIAN_PASSTHROUGH
              value: "1"
            - name: MERIDIAN_MAX_CONCURRENT
              value: "10"
            - name: MERIDIAN_IDLE_TIMEOUT_SECONDS
              value: "120"
          volumeMounts:
            - name: claude-auth
              mountPath: /home/claude/.claude
            - name: meridian-config
              mountPath: /home/claude/.config/meridian
            - name: meridian-cache
              mountPath: /home/claude/.cache/meridian
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3456
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3456
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3456
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: claude-auth
          persistentVolumeClaim:
            claimName: meridian-claude-auth
        - name: meridian-config
          persistentVolumeClaim:
            claimName: meridian-config
        - name: meridian-cache
          persistentVolumeClaim:
            claimName: meridian-cache
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meridian-claude-auth
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meridian-config
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meridian-cache
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
