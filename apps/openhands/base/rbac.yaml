apiVersion: v1
kind: ServiceAccount
metadata:
  name: openhands
  namespace: openhands
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openhands-runtime
  namespace: openhands
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openhands-runtime
  namespace: openhands
subjects:
  - kind: ServiceAccount
    name: openhands
    namespace: openhands
roleRef:
  kind: Role
  name: openhands-runtime
  apiGroup: rbac.authorization.k8s.io
