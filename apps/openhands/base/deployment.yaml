apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  namespace: openhands
  labels:
    app: openhands
    app.kubernetes.io/name: openhands
    app.kubernetes.io/instance: openhands
    app.kubernetes.io/component: server
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openhands
  template:
    metadata:
      labels:
        app: openhands
        app.kubernetes.io/name: openhands
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: openhands
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 0
      containers:
        - name: openhands
          image: docker.openhands.dev/openhands/openhands:1.7
          # Patch upstream bug: psutil sleeping status incorrectly mapped to STARTING
          command: ["/bin/bash", "-c"]
          args:
            - |
              F=/app/openhands/app_server/sandbox/process_sandbox_service.py
              # Patch 1: psutil sleeping status mapped to RUNNING (upstream bug)
              sed -i 's/status == psutil.STATUS_RUNNING/status in (psutil.STATUS_RUNNING, psutil.STATUS_SLEEPING)/' "$F"
              # Patch 2: exposed URL uses external base URL instead of localhost
              sed -i "s|url=f'http://localhost:{process_info.port}',|url=os.environ.get('OH_AGENT_BASE_URL', f'http://localhost:{process_info.port}'),|" "$F"
              # Patch 3: create /workspace/project and auto-init missing workspace dirs
              mkdir -p /workspace/project
              python3 << 'PATCH'
              import pathlib
              f = pathlib.Path('/app/.venv/lib/python3.13/site-packages/openhands/sdk/git/utils.py')
              src = f.read_text()
              old = '        raise GitRepositoryError(f"Directory does not exist: {repo_path}")'
              new = '\n'.join([
                  '        import subprocess as _sp',
                  '        repo_path.mkdir(parents=True, exist_ok=True)',
                  '        _sp.run(["git", "init", "-q"], cwd=str(repo_path), check=True)',
                  '        _sp.run(["git", "config", "user.email", "openhands@local"], cwd=str(repo_path), check=True)',
                  '        _sp.run(["git", "config", "user.name", "OpenHands"], cwd=str(repo_path), check=True)',
                  '        _sp.run(["git", "commit", "-q", "--allow-empty", "-m", "init"], cwd=str(repo_path), check=True)',
              ])
              assert old in src, "Patch target not found in source"
              f.write_text(src.replace(old, new))
              print("Patch 3 applied: auto-init missing workspace dirs")
              PATCH
              exec /app/entrypoint.sh uvicorn openhands.server.listen:app --host 0.0.0.0 --port 3000
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["NET_ADMIN", "SYS_ADMIN", "SYS_PTRACE"]
          env:
            - name: RUNTIME
              value: local
            - name: SANDBOX_USER_ID
              value: "0"
            - name: AGENT_SERVER_IMAGE_REPOSITORY
              value: ghcr.io/openhands/agent-server
            - name: AGENT_SERVER_IMAGE_TAG
              value: 1.19.1-python
            - name: LOG_ALL_EVENTS
              value: "true"
            - name: OH_AGENT_BASE_URL
              value: https://openhands.elposhox.dev
            - name: OPENHANDS_SUPPRESS_BANNER
              value: "1"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: jwt-secret
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: litellm-api-key
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /.openhands
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
              readOnly: true
            - name: workspace
              mountPath: /opt/workspace_base
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openhands-data
        - name: config
          configMap:
            name: openhands-config
        - name: workspace
          emptyDir:
            sizeLimit: 2Gi
