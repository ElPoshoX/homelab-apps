apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply labels to all resources
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: alertmanager
      homelab.local/OwnedBy: ElPoshoX

# Namespace for all resources
namespace: alertmanager

# Helm chart as a resource
# Official Alertmanager Helm repository: https://prometheus-community.github.io/helm-charts
helmCharts:
  - name: alertmanager
    repo: https://prometheus-community.github.io/helm-charts
    releaseName: alertmanager
    version: "1.34.0"
    valuesFile: values.yaml
    namespace: alertmanager

# Additional Kubernetes resources
resources:
  - namespace.yaml
  - secret.yaml

# Patches
patches:
  # Add apiVersion and kind to volumeClaimTemplates
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: alertmanager
    patch: |-
      - op: add
        path: /spec/volumeClaimTemplates/0/apiVersion
        value: v1
      - op: add
        path: /spec/volumeClaimTemplates/0/kind
        value: PersistentVolumeClaim
