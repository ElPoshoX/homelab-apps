apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
    name: alertmanager-secret
    namespace: alertmanager
spec:
    suspend: false
    secretTemplates:
        - name: telegram-token
          stringData:
            # Telegram Bot Token for AlertManager webhook
            token: YOUR_TELEGRAM_BOT_TOKEN_HERE
sops:
    age:
        - recipient: age1wtl5vlup8jkg5q3mwyed4mx5c8fsezqcd8lennp0qkreckfnupeswjlk3q
          enc: |
            -----BEGIN AGE ENCRYPTED FILE-----
            REPLACE_WITH_ENCRYPTED_CONTENT
            -----END AGE ENCRYPTED FILE-----
    lastmodified: "2026-03-21T00:00:00Z"
    mac: ENC[AES256_GCM,data:REPLACE_WITH_MAC,iv:REPLACE_WITH_IV,tag:REPLACE_WITH_TAG,type:str]
    encrypted_regex: ^(data|stringData)$
    version: 3.11.0
