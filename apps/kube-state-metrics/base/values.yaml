# Kube State Metrics Helm Chart Configuration
# Lightweight Kubernetes state metrics exporter for homelab Prometheus

# Replica configuration (1 replica, stateless)
replicas: 1

# Image configuration
image:
  repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
  pullPolicy: IfNotPresent

# Resource requests and limits (lightweight, CP2-friendly)
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Pod security context (non-root)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

# Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Service Monitor configuration for Prometheus scrape
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

# RBAC configuration
rbac:
  create: true

# Service Account configuration
serviceAccount:
  create: true

# Tolerations (optional)
tolerations: []

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
