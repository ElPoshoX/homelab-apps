apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: meltis
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: ingress
  hostnames:
    - moltis.elposhox.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: meltis
          port: 13131
          weight: 1
