apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply labels to all resources
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: metrics-server
      homelab.local/OwnedBy: ElPoshoX

# Namespace for all resources
namespace: kube-system

# Helm chart as a resource
# Official Metrics Server Helm repository: https://kubernetes-sigs.github.io/metrics-server/
helmCharts:
  - name: metrics-server
    repo: https://kubernetes-sigs.github.io/metrics-server/
    releaseName: metrics-server
    version: "3.13.0"
    valuesFile: values.yaml
    namespace: kube-system

# Override chart defaults to match existing cluster state
patches:
  - target:
      kind: Deployment
      name: metrics-server
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/securityContext
