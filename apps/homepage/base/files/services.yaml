- Observability:
      - One Uptime:
            icon: oneuptime.png
            href: "{{HOMEPAGE_VAR_UPTIME_URL}}"
            siteMonitor: "{{HOMEPAGE_VAR_UPTIME_URL}}"
            statusStyle: "dot"

      - Speed Test:
            icon: myspeed.png
            href: "{{HOMEPAGE_VAR_SPEEDTEST_URL}}"
            app: myspeed
            namespace: myspeed
            statusStyle: "dot"
            widget:
                type: myspeed
                url: "{{HOMEPAGE_VAR_SPEEDTEST_URL}}"

      - Grafana:
            icon: grafana.png
            href: "{{HOMEPAGE_VAR_GRAFANA_URL}}"
            app: grafana
            namespace: grafana
            statusStyle: "dot"
            widget:
                type: grafana
                version: 2 # optional, default is 1
                alerts: alertmanager # optional, default is grafana
                url: "{{HOMEPAGE_VAR_GRAFANA_URL}}"
                username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
                password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"

      - Prometheus:
            icon: prometheus.png
            href: "{{HOMEPAGE_VAR_PROMETHEUS_URL}}"
            namespace: prometheus
            app: prometheus
            statusStyle: "dot"
            widget:
                type: prometheus
                url: "{{HOMEPAGE_VAR_PROMETHEUS_URL}}"

