- DNS:
      - Primary AdGuard (Pi Zero 2 W):
            icon: adguard-home.png
            href: "{{HOMEPAGE_VAR_ADGUARD_PRIMARY_URL}}"
            siteMonitor: "{{HOMEPAGE_VAR_ADGUARD_PRIMARY_URL}}"
            statusStyle: "dot"
            widget:
                type: adguard
                url: "{{HOMEPAGE_VAR_ADGUARD_PRIMARY_URL}}"
                username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
                password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
      - Secondary AdGuard (TrueNas Scale):
            icon: adguard-home.png
            href: "{{HOMEPAGE_VAR_ADGUARD_SECONDARY_TRUENAS_URL}}"
            siteMonitor: "{{HOMEPAGE_VAR_ADGUARD_SECONDARY_TRUENAS_URL}}"
            statusStyle: "dot"
            widget:
                type: adguard
                url: "{{HOMEPAGE_VAR_ADGUARD_SECONDARY_TRUENAS_URL}}"
                username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
                password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
      - Secondary AdGuard (K8S):
            icon: adguard-home.png
            siteMonitor: "{{HOMEPAGE_VAR_ADGUARD_SECONDARY_K8S_URL}}"
            statusStyle: "dot"
            widget:
                type: adguard
                url: "{{HOMEPAGE_VAR_ADGUARD_SECONDARY_K8S_URL}}"
                username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
                password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
- Containers:
      - Portainer:
            icon: portainer.png
            href: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
            siteMonitor: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
            statusStyle: "dot"
            widget:
                type: portainer
                url: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
                env: 4
                key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
                container: ix-portainer-portainer-1

      - ArgoCD:
            icon: argo-cd.png
            href: "{{HOMEPAGE_VAR_ARGOCD_URL}}"
            siteMonitor: "{{HOMEPAGE_VAR_ARGOCD_URL}}"
            statusStyle: "dot"
            widget:
                type: argocd
                url: "{{HOMEPAGE_VAR_ARGOCD_URL}}"
                key: "{{HOMEPAGE_VAR_ARGOCD_KEY}}"
