- DNS:
      - Primary AdGuard (Pi Zero 2 W):
            icon: adguard-home.png
            href: https://adguard-primary.elposhox.dev
            widget:
                type: adguard
                url: https://adguard-primary.elposhox.dev
                username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
                password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
      - Secondary AdGuard (TrueNas Scale):
            icon: adguard-home.png
            href: https://adguard-secondary-truenas.elposhox.dev/
            widget:
                type: adguard
                url: https://adguard-secondary-truenas.elposhox.dev/
                username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
                password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
      - Secondary AdGuard (K8S):
            icon: adguard-home.png
            href: https://adguard-secondary-k8s.elposhox.dev/
            widget:
                type: adguard
                url: https://adguard-secondary-k8s.elposhox.dev/
                username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
                password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
- Containers:
      - Portainer:
            icon: portainer.png
            href: https://portainer.elposhox.dev/#!/home
            app: portainer
            namespace: portainer
            widget:
                type: portainer
                url: https://portainer.elposhox.dev
                env: 4
                key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
                container: ix-portainer-portainer-1
                
      - ArgoCD:
            icon: argo-cd.png
            href: https://argocd.elposhox.dev
            app: argocd-server
            namespace: argocd
            widget:
                type: argocd
                url: https://argocd.elposhox.dev
                key: "{{HOMEPAGE_VAR_ARGOCD_KEY}}"
- Administration:
      - TrueNas:
            icon: truenas-scale.png
            href: https://truenas.elposhox.dev
            widget:
                type: truenas
                url: https://truenas.elposhox.dev
                key: "{{HOMEPAGE_VAR_TRUENAS_KEY}}"
                enablePools: true

      - Longhorn:
            icon: longhorn.png
            href: https://longhorn.elposhox.dev
            app: longhorn-ui
            namespace: longhorn-system

      - Proxmox:
            icon: proxmox.png
            href: https://proxmox.elposhox.dev
            widget:
                type: proxmox
                url: https://proxmox.elposhox.dev
                username: "{{HOMEPAGE_VAR_PROXMOX_USER}}"
                password: "{{HOMEPAGE_VAR_PROXMOX_PASS}}"
- Media:
      - Jellyseerr:
            icon: jellyseerr.png
            href: https://jellyseerr.elposhox.dev
            widget:
                type: jellyseerr
                url: https://jellyseerr.elposhox.dev
                key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"
      - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.elposhox.dev
            widget:
                type: jellyfin
                url: https://jellyfin.elposhox.dev
                key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"

- Personal:
      - Home Assistant:
            icon: home-assistant.png
            href: https://home-assistant.elposhox.dev
            app: home-assistant
            namespace: home-assistant
            widget:
                type: homeassistant
                url: https://home-assistant.elposhox.dev
                key: "{{HOMEPAGE_VAR_HOMEASSISTANT_KEY}}"

      - Immich:
            icon: immich.png
            href: https://immich.elposhox.dev
            widget:
                type: immich
                url: https://immich.elposhox.dev
                key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
                version: 2

      # - Octoprint:
      #     icon: octoprint.png
