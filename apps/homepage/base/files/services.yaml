      - Actual Budget:
            icon: actual-budget.png
            href: https://actual-budget.elposhox.dev

- Observability:
      - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://uptime.elposhox.dev
            app: uptime-kuma
            namespace: uptime-kuma
            widget:
                type: uptimekuma
                url: https://uptime.elposhox.dev
                slug: home-lab

      - Speed Test:
            icon: myspeed.png
            href: https://speedtest.elposhox.dev
            app: myspeed
            namespace: myspeed
            widget:
                type: myspeed
                url: https://speedtest.elposhox.dev

      - Grafana:
            icon: grafana.png
            href: https://grafana.elposhox.dev
            widget:
                type: grafana
                version: 2 # optional, default is 1
                alerts: alertmanager # optional, default is grafana
                url: https://grafana.elposhox.dev
                username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
                password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"

      - Prometheus:
            icon: prometheus.png
            href: https://prometheus.elposhox.dev
            widget:
                type: prometheus
                url: https://prometheus.elposhox.dev

      #   - Promtail:
      #         icon: loki.png
