- unifi_console:
    url: https://192.168.0.1
    username: "{{HOMEPAGE_VAR_UNIFI_USER}}"
    password: "{{HOMEPAGE_VAR_UNIFI_PASS}}"

- kubernetes:
    cluster:
      show: true
      cpu: true
      memory: true
      showLabel: true
      label: "cluster"
    nodes:
      show: false
      cpu: false
      memory: false
      showLabel: false
- longhorn:
    expanded: true
    total: true
    labels: true
    nodes: true
- resources:
    backend: resources
    expanded: true
    cpu: true
    memory: true
    network: default
