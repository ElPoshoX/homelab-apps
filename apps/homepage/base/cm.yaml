apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: ElPoshoX's Homepage
    theme: dark
    headerStyle: boxed
    language: es-MX
    target: _blank
    showStats: true
    statusStyle: "dot"

  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - ElPoshoX Channel:
        - Github:
            - abbr: GH
              href: https://github.com/
        - Facebook:
            - abbr: FB
              href: https://facebook.com/
        - Instagram:
            - abbr: IG
              href: https://instagram.com/
        - Youtube:
            - abbreviation: YT
              href: https://youtube.com/
        - Website:
            - abbreviation: WP
              href: https://elposhox.dev/
  services.yaml: |
    - HomeLab:
        - Speedtest:
            icon: speedtest-tracker.png
            href: http://speedtest.elposhox.dev/
            widget:
              type: speedtest
              url: http://speedtest.elposhox.dev
        - ArgoCD
            icon: argo-cd.png
            href: https://argocd.elposhox.dev/
            widget:
              type: argocd
              url: https://argocd.elposhox.dev/
              username: "{{HOMEPAGE_VAR_ARGOCD_USER}}"
              password: "{{HOMEPAGE_VAR_ARGOCD_PASS}}"
        - Primary AdGuard:
            icon: adguard-home.png
            href: https://adguard-primary.elposhox.dev/
            widget:
              type: adguard
              url: https://adguard-primary.elposhox.dev/
              username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
              password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
        - Secondary AdGuard:
            icon: adguard-home.png
            href: https://adguard-primary.elposhox.dev/
            widget:
              type: adguard
              url: https://adguard-primary.elposhox.dev/
              username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
              password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
    - My First Group:
        - My First Service:
            href: http://localhost/
            description: Homepage is awesome

    - My Second Group:
        - My Second Service:
            href: http://localhost/
            description: Homepage is the best

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: brave
        focus: true
        showSearchSuggestions: true
        target: _blank
    - datetime:
        text_size: xl
        locale: es-MX
        format:
          timeStyle: short
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
  docker.yaml: ""