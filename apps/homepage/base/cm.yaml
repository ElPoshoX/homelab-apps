apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: ElPoshoX's Homepage
    theme: dark
    headerStyle: boxed
    language: es-MX
    target: _blank
    showStats: true
    statusStyle: "dot"
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - ElPoshoX Channel:
        - Github:
            - abbr: GH
              href: https://github.com/
        - Facebook:
            - abbr: FB
              href: https://facebook.com/
        - Instagram:
            - abbr: IG
              href: https://instagram.com/
        - Youtube:
            - abbreviation: YT
              href: https://youtube.com/
        - Website:
            - abbreviation: WP
              href: https://elposhox.dev/
  services.yaml: |
    - Administration:
        - Primary AdGuard:
            icon: adguard-home.png
            href: https://adguard-primary.elposhox.dev
            widget:
              type: adguard
              url: https://adguard-primary.elposhox.dev
              username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
              password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
        - Secondary AdGuard:
            icon: adguard-home.png
            href: https://adguard-secondary.elposhox.dev
            widget:
              type: adguard
              url: https://adguard-secondary.elposhox.dev
              username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
              password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"

        - Traefik:
            icon: traefik.png
            href: https://traefik.elposhox.dev
            widget:
              type: traefik
              url: https://traefik.elposhox.dev

        - ArgoCD:
            icon: argo-cd.png
            href: https://argocd.elposhox.dev
            widget:
              type: argocd
              url: https://argocd.elposhox.dev
              key: "{{HOMEPAGE_VAR_ARGOCD_KEY}}"

        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.elposhox.dev
            siteMonitor: https://longhorn.elposhox.dev

    - Personal:
        - Home Assistant:
            icon: home-assistant.png
            href: https://home-assistant.elposhox.dev
            widget:
              type: homeassistant
              url: https://home-assistant.elposhox.dev
              key: "{{HOMEPAGE_VAR_HOMEASSISTANT_KEY}}"
              # custom:
              #   - state: sensor.total_power
              #   - state: sensor.total_energy_today
              #     label: energy today
              #   - template: "{{ states.switch|selectattr('state','equalto','on')|list|length }}"
              #     label: switches on
              #   - state: weather.forecast_home
              #     label: wind speed
              #     value: "{attributes.wind_speed} {attributes.wind_speed_unit}"

    - Observability:
        - ArgoCD:
            icon: argo-cd.png
            href: https://argocd.elposhox.dev
            widget:
              type: argocd
              url: https://argocd.elposhox.dev
              key: "{{HOMEPAGE_VAR_ARGOCD_KEY}}"

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
  docker.yaml: ""
