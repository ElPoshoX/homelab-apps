apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: adguard
  labels:
    app: adguard
    app.kubernetes.io/instance: adguard-prd
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: adguard
    app.kubernetes.io/part-of: adguard
    homelab.local/OwnedBy: ElPoshoX
spec:
  selector:
    app: adguard
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: adguard
    homelab.local/OwnedBy: ElPoshoX
  ports:
  - name: web-admin
    protocol: TCP
    port: 3000
    targetPort: 3000
  - name: web-interface
    protocol: TCP
    port: 80
    targetPort: 80
  - name: dns-udp
    protocol: UDP
    port: 53
    targetPort: 53
  - name: dns-tcp
    protocol: TCP
    port: 53
    targetPort: 53
  type: ClusterIP
  internalTrafficPolicy: Local
  
---
