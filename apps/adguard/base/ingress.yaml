# Note: DNS routes (IngressRouteTCP/UDP) are not converted to HTTPRoute
# as HTTPRoute only supports HTTP/HTTPS. DNS routes require separate configuration.
# TODO: Configure DNS routes separately for Cilium if needed

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adguard-dashboard
  namespace: adguard
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: ingress
  hostnames:
    - adguard-secondary-k8s.elposhox.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: adguard-home
          port: 3000
          weight: 1
