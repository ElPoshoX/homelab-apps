apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard-dashboard
  namespace: adguard
spec:
  entryPoints:
  - web
  routes:
  - kind: Rule
    match: Host(`adguard.local`)
    services:
    - kind: Service
      name: adguard-home
      port: 3000
    - kind: Service
      name: adguard-home
      port: 80
    - kind: Service
      name: adguard-home
      port: 53