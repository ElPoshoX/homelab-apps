apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aegis-pipelines
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Aegis"
data:
  aegis-pipelines.json: |
    {
      "uid": "aegis-pipelines",
      "title": "Aegis Inter-Agent Pipelines",
      "description": "Pipeline activity, per-agent request rates, learnings, and evaluation metrics",
      "editable": true,
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "title": "Active Pipelines",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "aegis_active_pipelines"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              },
              "min": 0,
              "max": 20
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 2,
          "title": "Requests by Agent",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (agent) (rate(aegis_requests_total[5m]))",
              "legendFormat": "{{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 3,
          "title": "Total Learnings",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(aegis_learnings_total)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 4,
          "title": "Total Evaluations",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(aegis_eval_total)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "purple", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        }
      ],
      "templating": { "list": [] },
      "annotations": { "list": [] }
    }
