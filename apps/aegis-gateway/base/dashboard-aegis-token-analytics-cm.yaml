apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aegis-token-analytics
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Aegis"
data:
  aegis-token-analytics.json: |
    {
      "uid": "aegis-token-analytics",
      "title": "Aegis Token Analytics",
      "editable": true,
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "title": "Input vs Output Tokens",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(litellm_input_tokens_total[5m])",
              "legendFormat": "Input Tokens",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "refId": "B",
              "expr": "rate(litellm_output_tokens_total[5m])",
              "legendFormat": "Output Tokens",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 2,
          "title": "Cache Hit Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "aegis_cache_hit_rate",
              "legendFormat": "Cache Hit Rate",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 0.8 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        },
        {
          "id": 3,
          "title": "Cache Tokens",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(litellm_cache_read_tokens[5m])",
              "legendFormat": "Cache Read Tokens",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "refId": "B",
              "expr": "rate(litellm_cache_write_tokens[5m])",
              "legendFormat": "Cache Write Tokens",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "sum"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 4,
          "title": "Total Cache Hits",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(aegis_cache_hits_total)",
              "legendFormat": "Cache Hits",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          }
        }
      ]
    }
