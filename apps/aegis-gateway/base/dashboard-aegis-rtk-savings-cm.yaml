apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aegis-rtk-savings
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Aegis"
data:
  aegis-rtk-savings.json: |
    {
      "uid": "aegis-rtk-savings",
      "title": "Aegis RTK Savings",
      "editable": true,
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "title": "RTK Savings Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(aegis_rtk_savings_tokens[5m])",
              "legendFormat": "Savings Rate",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        },
        {
          "id": 2,
          "title": "Cumulative Tokens Saved",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(aegis_rtk_savings_tokens)",
              "legendFormat": "Tokens Saved",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "Tool Route Bypasses",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(aegis_tool_routes_total)",
              "legendFormat": "Bypasses",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "purple", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "title": "Template Hit Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "aegis_template_hits_total / (aegis_template_hits_total + aegis_template_misses_total)",
              "legendFormat": "Hit Rate",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 0.8 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        }
      ]
    }
