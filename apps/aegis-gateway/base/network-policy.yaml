apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: litellm-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: litellm
  ingress:
    - fromEntities:
        - world
        - cluster
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: litellm-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: litellm
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"

    # PostgreSQL (cross-namespace)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: postgres
            cnpg.io/cluster: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

    # Redis (same namespace)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP

    # Meridian bridge (cross-namespace, Phase 0.2)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: aegis-meridian
            app.kubernetes.io/name: meridian
      toPorts:
        - ports:
            - port: "3456"
              protocol: TCP

    # External LLM APIs — FQDN locked, HTTPS only
    - toFQDNs:
        - matchName: api.deepseek.com
        - matchName: dashscope-us.aliyuncs.com
        - matchName: generativelanguage.googleapis.com
        - matchName: api.anthropic.com
        - matchName: raw.githubusercontent.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: redis-isolation
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: litellm
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: aegis-exporter
            app.kubernetes.io/name: aegis-exporter
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
  egress: []
