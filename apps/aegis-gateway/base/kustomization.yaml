apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: aegis
      homelab.local/OwnedBy: ElPoshoX

namespace: aegis-gateway

resources:
  - namespace.yaml
  - secret.yaml
  - litellm-config.yaml
  - aegis-router.yaml
  - litellm.yaml
  - ingress.yaml
  - redis.yaml
  - alerts.yaml
  - business-alerts.yaml
  - servicemonitor.yaml
  - network-policy.yaml
  - dashboard-aegis-cost-overview-cm.yaml
  - dashboard-aegis-token-analytics-cm.yaml
  - dashboard-aegis-rtk-savings-cm.yaml
  - dashboard-aegis-agent-performance-cm.yaml
  - dashboard-aegis-moltis-agents-cm.yaml
  - dashboard-aegis-pipelines-cm.yaml
