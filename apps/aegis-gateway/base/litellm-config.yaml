apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      # ── Meridian (Claude Max 20x) ─────────────────────────────
      # Short aliases (used by Moltis, orchestrator)
      - model_name: claude-sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-opus-4-7
        litellm_params:
          model: anthropic/claude-opus-4-7
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-haiku
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      # Full model IDs (sent by Claude Code, Anthropic SDK clients)
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-opus-4-8
        litellm_params:
          model: anthropic/claude-opus-4-8
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-fable-5
        litellm_params:
          model: anthropic/claude-fable-5
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      # ── Claude API direct (fallback if Meridian blocked) ──────
      - model_name: claude-sonnet-api
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: claude-haiku-api
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_key: os.environ/ANTHROPIC_API_KEY

      # ── DeepSeek V4 Pro ──────────────────────────────────────
      - model_name: deepseek-v4-pro
        litellm_params:
          model: deepseek/deepseek-reasoner
          api_key: os.environ/DEEPSEEK_API_KEY
          input_cost_per_token: 0.00000174
          output_cost_per_token: 0.00000348

      # ── DeepSeek V4 Flash ────────────────────────────────────
      - model_name: deepseek-v4-flash
        litellm_params:
          model: deepseek/deepseek-chat
          api_key: os.environ/DEEPSEEK_API_KEY
          input_cost_per_token: 0.00000014
          output_cost_per_token: 0.00000028

      # ── Qwen3-235B (mid tier: coding, blog, PoC, review) ────
      - model_name: qwen3-235b
        litellm_params:
          model: openai/qwen3-235b-a22b
          api_base: https://dashscope-us.aliyuncs.com/compatible-mode/v1
          api_key: os.environ/QWEN_API_KEY
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.000001

      # ── Gemini 2.5 Flash-Lite (fallback, last resort) ───────
      - model_name: gemini-flash-lite
        litellm_params:
          model: gemini/gemini-2.5-flash-lite
          api_key: os.environ/GEMINI_API_KEY
          input_cost_per_token: 0.0000001
          output_cost_per_token: 0.0000003

    litellm_settings:
      drop_params: true
      success_callback:
        - prometheus
        - otel
      failure_callback:
        - otel
      cache: true
      cache_params:
        type: redis
        host: redis
        port: 6379
        namespace: "aegis"
        ttl: 3600
        supported_call_types:
          - acompletion
          - completion
      set_verbose: false
      num_retries: 3
      request_timeout: 120
      fallbacks:
        - claude-opus-4-8: [claude-opus-4-7, claude-sonnet, claude-sonnet-api, deepseek-v4-pro, gemini-flash-lite]
        - claude-opus-4-7: [claude-sonnet, claude-sonnet-api, deepseek-v4-pro, gemini-flash-lite]
        - claude-opus-4-6: [claude-sonnet, claude-sonnet-api, deepseek-v4-pro, gemini-flash-lite]
        - claude-sonnet: [claude-sonnet-api, deepseek-v4-pro, deepseek-v4-flash, gemini-flash-lite]
        - claude-sonnet-4-6: [claude-sonnet-api, deepseek-v4-pro, deepseek-v4-flash, gemini-flash-lite]
        - claude-haiku: [claude-haiku-api, deepseek-v4-flash, gemini-flash-lite]
        - claude-haiku-4-5-20251001: [claude-haiku-api, deepseek-v4-flash, gemini-flash-lite]
        - claude-fable-5: [claude-sonnet, deepseek-v4-pro, gemini-flash-lite]
        - claude-sonnet-api: [deepseek-v4-pro, gemini-flash-lite]
        - claude-haiku-api: [deepseek-v4-flash, gemini-flash-lite]
        - deepseek-v4-pro: [qwen3-235b, deepseek-v4-flash, gemini-flash-lite]
        - deepseek-v4-flash: [qwen3-235b, gemini-flash-lite]
        - qwen3-235b: [deepseek-v4-flash, gemini-flash-lite]

    router_settings:
      routing_strategy: "usage-based-routing-v2"
      enable_pre_call_checks: true
      redis_host: redis
      redis_port: 6379

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      max_budget: 300
      budget_duration: "30d"
