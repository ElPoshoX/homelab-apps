apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      # ── Meridian (Claude Max 20x) ─────────────────────────────
      # Short aliases (used by Moltis, orchestrator)
      - model_name: claude-sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-opus-4-7
        litellm_params:
          model: anthropic/claude-opus-4-7
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-haiku
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      # Full model IDs (sent by Claude Code, Anthropic SDK clients)
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-opus-4-8
        litellm_params:
          model: anthropic/claude-opus-4-8
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      - model_name: claude-fable-5
        litellm_params:
          model: anthropic/claude-fable-5
          api_base: http://meridian.aegis-meridian.svc.cluster.local:3456
          api_key: "not-needed"
          input_cost_per_token: 0
          output_cost_per_token: 0

      # ── Claude API direct (fallback if Meridian blocked) ──────
      - model_name: claude-sonnet-api
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: claude-haiku-api
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_key: os.environ/ANTHROPIC_API_KEY

      # ── DeepSeek V4 Pro ──────────────────────────────────────
      - model_name: deepseek-v4-pro
        litellm_params:
          model: deepseek/deepseek-reasoner
          api_key: os.environ/DEEPSEEK_API_KEY
          input_cost_per_token: 0.00000174
          output_cost_per_token: 0.00000348

      # ── DeepSeek V4 Flash ────────────────────────────────────
      - model_name: deepseek-v4-flash
        litellm_params:
          model: deepseek/deepseek-chat
          api_key: os.environ/DEEPSEEK_API_KEY
          input_cost_per_token: 0.00000014
          output_cost_per_token: 0.00000028

      # ── Qwen3-235B (mid tier: coding, blog, PoC, review) ────
      - model_name: qwen3-235b
        litellm_params:
          model: openai/qwen3-235b-a22b
          api_base: https://dashscope-us.aliyuncs.com/compatible-mode/v1
          api_key: os.environ/QWEN_API_KEY
          input_cost_per_token: 0.0000002
          output_cost_per_token: 0.000001

      # ── Gemini 2.5 Flash-Lite (fallback, last resort) ───────
      - model_name: gemini-flash-lite
        litellm_params:
          model: gemini/gemini-2.5-flash-lite
          api_key: os.environ/GEMINI_API_KEY
          input_cost_per_token: 0.0000001
          output_cost_per_token: 0.0000003

      # ── Smart Router (complexity-based model selection) ──
      # Agents send model="auto" → LiteLLM classifies by
      # request complexity and routes to optimal model.
      # Tiers: SIMPLE=flash(cheap), MEDIUM=sonnet($0),
      #        COMPLEX=opus($0), REASONING=deepseek-pro
      - model_name: auto
        litellm_params:
          model: auto_router/complexity_router
          complexity_router_config:
            tiers:
              SIMPLE: deepseek-v4-flash
              MEDIUM: claude-sonnet
              COMPLEX: claude-opus-4-6
              REASONING: deepseek-v4-pro
          complexity_router_default_model: claude-sonnet

    litellm_settings:
      drop_params: true
      callbacks: aegis_router.router_instance
      success_callback:
        - prometheus
        - otel
      failure_callback:
        - otel
      cache: true
      cache_params:
        type: redis
        host: redis
        port: 6379
        namespace: "aegis"
        ttl: 3600
        supported_call_types:
          - acompletion
          - completion
      set_verbose: false
      num_retries: 3
      request_timeout: 120
      fallbacks:
        - claude-opus-4-8: [claude-opus-4-7, claude-sonnet, claude-sonnet-api, deepseek-v4-pro, gemini-flash-lite]
        - claude-opus-4-7: [claude-sonnet, claude-sonnet-api, deepseek-v4-pro, gemini-flash-lite]
        - claude-opus-4-6: [claude-sonnet, claude-sonnet-api, deepseek-v4-pro, gemini-flash-lite]
        - claude-sonnet: [claude-sonnet-api, deepseek-v4-pro, deepseek-v4-flash, gemini-flash-lite]
        - claude-sonnet-4-6: [claude-sonnet-api, deepseek-v4-pro, deepseek-v4-flash, gemini-flash-lite]
        - claude-haiku: [claude-haiku-api, deepseek-v4-flash, gemini-flash-lite]
        - claude-haiku-4-5-20251001: [claude-haiku-api, deepseek-v4-flash, gemini-flash-lite]
        - claude-fable-5: [claude-sonnet, deepseek-v4-pro, gemini-flash-lite]
        - claude-sonnet-api: [deepseek-v4-pro, gemini-flash-lite]
        - claude-haiku-api: [deepseek-v4-flash, gemini-flash-lite]
        - deepseek-v4-pro: [qwen3-235b, deepseek-v4-flash, gemini-flash-lite]
        - deepseek-v4-flash: [qwen3-235b, gemini-flash-lite]
        - qwen3-235b: [deepseek-v4-flash, gemini-flash-lite]

    router_settings:
      routing_strategy: "usage-based-routing-v2"
      enable_pre_call_checks: true
      redis_host: redis
      redis_port: 6379

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      max_budget: 300
      budget_duration: "30d"

  aegis_router.py: |
    """Aegis smart model router — LiteLLM async_pre_call_hook callback."""

    import asyncio
    import json
    import logging
    import os
    import time
    from pathlib import Path
    from typing import Optional, Union

    from litellm.integrations.custom_logger import CustomLogger
    from litellm.proxy._types import UserAPIKeyAuth

    logger = logging.getLogger("aegis_router")

    DEFAULT_ROUTING_TABLE = {
        "code-generation": "qwen3-235b",
        "code-review": "claude-sonnet",
        "architecture": "claude-opus-4-6",
        "reasoning": "deepseek-v4-pro",
        "simple-query": "deepseek-v4-flash",
        "creative-writing": "claude-fable-5",
        "eval-judge": "claude-haiku",
        "research": "claude-sonnet",
        "implementation": "qwen3-235b",
        "testing": "claude-sonnet",
        "documentation": "claude-sonnet",
        "mechanical": "deepseek-v4-flash",
    }

    ROUTING_TABLE_PATH = os.environ.get(
        "AEGIS_ROUTING_TABLE_PATH",
        "/etc/aegis-router/routing-table.json",
    )

    DEFAULT_MODEL = "claude-sonnet"
    RELOAD_INTERVAL_S = 5.0


    class AegisRouter(CustomLogger):

        def __init__(self):
            super().__init__()
            self._routing_table = dict(DEFAULT_ROUTING_TABLE)
            self._table_mtime: float = 0
            self._last_check: float = 0
            self._reload_lock = asyncio.Lock()
            self._load_routing_table()

        def _load_routing_table(self) -> None:
            path = Path(ROUTING_TABLE_PATH)
            if not path.exists():
                return
            try:
                mtime = path.stat().st_mtime
                if mtime <= self._table_mtime:
                    return
                with open(path) as f:
                    loaded = json.load(f)
                self._routing_table = {**DEFAULT_ROUTING_TABLE, **loaded}
                self._table_mtime = mtime
                logger.info("Routing table reloaded (%d entries)", len(self._routing_table))
            except Exception as e:
                logger.warning("Failed to load routing table: %s", e)

        async def _maybe_reload_table(self) -> None:
            now = time.monotonic()
            if now - self._last_check < RELOAD_INTERVAL_S:
                return
            self._last_check = now
            async with self._reload_lock:
                self._load_routing_table()

        async def async_pre_call_hook(
            self,
            user_api_key_dict: UserAPIKeyAuth,
            cache,
            data: dict,
            call_type: str,
        ) -> Optional[Union[Exception, str, dict]]:
            await self._maybe_reload_table()

            model = data.get("model", "")
            if model != "auto":
                return None

            headers = data.get("metadata", {}).get("headers", {})
            task_type = (
                headers.get("x-ollin-task-type")
                or headers.get("x-aegis-task-type")
            )

            if task_type:
                if task_type not in self._routing_table:
                    logger.warning("Unknown task type from header: %.100s", task_type)
                resolved = self._routing_table.get(task_type, DEFAULT_MODEL)
                logger.info("Header routing: %s -> %s", task_type, resolved)
                data["model"] = resolved
                self._add_routing_metadata(data, task_type, "header", resolved)
                return data

            task_type = self._classify_from_content(data)
            if task_type is None:
                return None

            resolved = self._routing_table.get(task_type, DEFAULT_MODEL)
            logger.info("Content routing: %s -> %s", task_type, resolved)
            data["model"] = resolved
            self._add_routing_metadata(data, task_type, "classify", resolved)
            return data

        def _classify_from_content(self, data: dict) -> Optional[str]:
            messages = data.get("messages", [])
            text = ""
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, str):
                    text += " " + content
                elif isinstance(content, list):
                    for block in content:
                        if isinstance(block, dict) and block.get("type") == "text":
                            text += " " + block.get("text", "")
            text = text.lower()

            categories = [
                ("architecture", ["architect", "design system", "trade-off", "adr", "rfc", "system design"]),
                ("reasoning", ["step by step", "prove that", "derive", "theorem", "mathematical", "formal logic"]),
                ("code-review", ["code review", "pr review", "find bugs", "audit code", "review this code", "review the diff"]),
                ("code-generation", ["implement", "write code", "write a function", "create function", "add feature", "build a"]),
                ("testing", ["write test", "add test", "test coverage", "unit test", "integration test"]),
                ("creative-writing", ["blog post", "write an article", "write about", "essay about", "narrative"]),
                ("documentation", ["write documentation", "update readme", "add docstring", "explain how"]),
                ("eval-judge", ["evaluate quality", "score this", "rate this", "judge this", "assess quality"]),
                ("research", ["research", "find out about", "investigate", "compare options", "analyze market"]),
            ]

            for category, keywords in categories:
                if any(kw in text for kw in keywords):
                    return category

            return None

        def _add_routing_metadata(self, data: dict, task_type: str, source: str, model: str) -> None:
            meta = data.get("metadata", {})
            meta["aegis_task_type"] = task_type
            meta["aegis_routing_source"] = source
            meta["aegis_routed_model"] = model
            data["metadata"] = meta


    router_instance = AegisRouter()
