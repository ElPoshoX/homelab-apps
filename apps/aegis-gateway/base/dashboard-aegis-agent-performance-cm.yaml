apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aegis-agent-performance
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Aegis"
data:
  aegis-agent-performance.json: |
    {
      "uid": "aegis-agent-performance",
      "title": "Aegis Agent Performance",
      "description": "Agent-level performance metrics: latency percentiles, step rates, errors, and template cache efficiency",
      "editable": true,
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "title": "Request Latency p50/p95/p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.5, rate(aegis_request_latency_ms_bucket[5m]))",
              "legendFormat": "p50"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, rate(aegis_request_latency_ms_bucket[5m]))",
              "legendFormat": "p95"
            },
            {
              "refId": "C",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(aegis_request_latency_ms_bucket[5m]))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 2,
          "title": "Steps per Agent",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(aegis_agent_steps_total[5m])",
              "legendFormat": "{{agent}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 3,
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (type) (rate(aegis_errors_total[5m]))",
              "legendFormat": "{{type}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "errors/s",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 4,
          "title": "Total Requests",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(aegis_requests_total)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 5,
          "title": "Template Hit Rate",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(aegis_template_hits_total) / (sum(aegis_template_hits_total) + sum(aegis_template_misses_total))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 0.8 }
                ]
              },
              "min": 0,
              "max": 1
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          }
        }
      ],
      "templating": { "list": [] },
      "annotations": { "list": [] }
    }
