apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aegis-cost-overview
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Aegis"
data:
  aegis-cost-overview.json: |
    {
      "uid": "aegis-cost-overview",
      "title": "Aegis Cost Overview",
      "editable": true,
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "title": "Spend by Model",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (model) (increase(litellm_spend_total[1h]))",
              "legendFormat": "{{ model }}",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 2,
          "title": "Daily Spend",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(litellm_spend_total[24h]))",
              "legendFormat": "Daily Spend",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        },
        {
          "id": 3,
          "title": "Budget Utilization",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "1 - (litellm_remaining_budget / 300)",
              "legendFormat": "Utilization",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 4,
          "title": "Projected Monthly Spend",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(litellm_spend_total[24h])) * 30",
              "legendFormat": "Projected",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 280 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        }
      ]
    }
