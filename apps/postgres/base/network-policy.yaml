apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: postgres-isolation
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  ingress:
    # CNPG operator
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
    # Inter-replica replication
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Aegis LiteLLM
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: aegis-gateway
            app.kubernetes.io/name: litellm
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # CloudBeaver
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cloudbeaver
            app.kubernetes.io/name: cloudbeaver
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Plane
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: plane
            app.kubernetes.io/part-of: plane
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    # Kubernetes API server
    - toEntities:
        - kube-apiserver
    # CNPG operator
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
    # Inter-replica replication
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Garage S3 (backups)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
    # ghcr.io (CNPG image verification)
    - toFQDNs:
        - matchName: ghcr.io
        - matchName: pkg-containers.githubusercontent.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
