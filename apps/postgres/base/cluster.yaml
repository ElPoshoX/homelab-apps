apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  env:
    - name: AWS_DEFAULT_REGION
      value: garage

  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10

  primaryUpdateStrategy: unsupervised

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname

  postgresql:
    parameters:
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      max_connections: "200"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      wal_level: "replica"
      max_wal_senders: "10"
      max_replication_slots: "10"

  bootstrap:
    initdb:
      database: litellm
      owner: litellm
      secret:
        name: postgres-credentials
      postInitApplicationSQL:
        - CREATE DATABASE phoenix OWNER litellm
        - CREATE DATABASE langgraph OWNER litellm

  storage:
    size: 10Gi
    storageClass: longhorn

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  backup:
    barmanObjectStore:
      destinationPath: s3://postgres-backup/
      endpointURL: http://garage.garage.svc.cluster.local:3900
      s3Credentials:
        accessKeyId:
          name: postgres-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-s3-credentials
          key: SECRET_ACCESS_KEY
    retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true
