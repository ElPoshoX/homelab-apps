apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plane
  namespace: plane
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: ingress
  hostnames:
    - plane.elposhox.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - kind: Service
          name: plane-app-api
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - kind: Service
          name: plane-app-api
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /spaces
      backendRefs:
        - kind: Service
          name: plane-app-space
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /god-mode
      backendRefs:
        - kind: Service
          name: plane-app-admin
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /live/
      backendRefs:
        - kind: Service
          name: plane-app-live
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /plane-uploads
      backendRefs:
        - kind: Service
          name: garage
          namespace: garage
          port: 3900
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: plane-app-web
          port: 3000
