apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  instances: 1

  postgresql:
    parameters:
      shared_buffers: "128MB"
      effective_cache_size: "256MB"
      max_connections: "50"

  bootstrap:
    initdb:
      database: litellm
      owner: litellm
      secret:
        name: postgres-credentials

  storage:
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  monitoring:
    enablePodMonitor: true
