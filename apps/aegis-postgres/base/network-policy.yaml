apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: postgres-isolation
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  ingress:
    # LiteLLM (cross-namespace)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: aegis-gateway
            app.kubernetes.io/name: litellm
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Envoy gateway (for TCPRoute local access)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ingress
            gateway.envoyproxy.io/owning-gateway-name: homelab-gateway
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
