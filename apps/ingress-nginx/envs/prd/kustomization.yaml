apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ./../../base
- deployment.yaml


patches:
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: --controller.wildcardTLS.cert=cert-manager/elposhox-dev-certificate
  target:
    kind: Deployment
    name: ingress-nginx-controller
    namespace: ingress-nginx
