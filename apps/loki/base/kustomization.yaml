apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: loki
      homelab.local/OwnedBy: ElPoshoX

namespace: loki

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    releaseName: loki
    version: "6.55.0"
    valuesFile: values.yaml
    namespace: loki

resources:
  - namespace.yaml
  - secret.yaml
  - ingress.yaml

patches:
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: loki
    patch: |-
      - op: add
        path: /spec/revisionHistoryLimit
        value: 1
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: loki-gateway
    patch: |-
      - op: add
        path: /spec/revisionHistoryLimit
        value: 1
