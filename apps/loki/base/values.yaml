# Loki Community Helm Chart v13.6.3
# Monolithic log aggregation for homelab observability stack

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  limits_config:
    retention_period: 360h
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    max_cache_freshness_per_query: 10m

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  ruler:
    storage:
      type: s3
      s3:
        endpoint: garage.garage.svc.cluster.local:3900
        bucketnames: loki-ruler
        access_key_id: ${LOKI_S3_ACCESS_KEY_ID}
        secret_access_key: ${LOKI_S3_SECRET_ACCESS_KEY}
        s3forcepathstyle: true
        insecure: true
        region: garage

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: garage.garage.svc.cluster.local:3900
      accessKeyId: ${LOKI_S3_ACCESS_KEY_ID}
      secretAccessKey: ${LOKI_S3_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: true
      region: garage

  server:
    http_listen_port: 3100
    log_level: info
    log_format: json

  podSecurityContext:
    fsGroup: 10001
    runAsNonRoot: true
    runAsUser: 10001

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

singleBinary:
  replicas: 1
  extraArgs:
    - "-config.expand-env"
    - "true"
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  persistence:
    enabled: true
    storageClass: longhorn
    size: 30Gi
    enableStatefulSetAutoDeletePVC: false
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  affinity: {}

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: true

chunksCache:
  enabled: false
resultsCache:
  enabled: false
