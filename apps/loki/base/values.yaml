# Loki Helm Chart Configuration
# Monolithic log aggregation for homelab observability stack

# Monolithic mode - single pod deployment
loki:
  # Authentication and tenancy disabled for internal use
  auth_enabled: false

  # Must match replica count — SingleBinary with 1 replica requires replication_factor: 1
  commonConfig:
    replication_factor: 1

  # Log retention policy
  limits_config:
    retention_period: 360h  # 15 days
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    max_cache_freshness_per_query: 10m

  # Chunk encoding and storage
  chunk_store_config:
    max_look_back_period: 0s

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  # S3 storage backend (Garage)
  storage_config:
    aws:
      s3: s3://loki-bucket
      endpoint: garage.garage.svc.cluster.local:3900
      access_key_id: ${LOKI_S3_ACCESS_KEY_ID}
      secret_access_key: ${LOKI_S3_SECRET_ACCESS_KEY}
      s3forcepathstyle: true
      insecure: true
      region: garage
    index_cache_validity: 5m

  # Ruler S3 config — must mirror storage_config.aws so ruler doesn't fall back to AWS IMDS
  ruler:
    storage:
      type: s3
      s3:
        endpoint: garage.garage.svc.cluster.local:3900
        bucketnames: loki-ruler
        access_key_id: ${LOKI_S3_ACCESS_KEY_ID}
        secret_access_key: ${LOKI_S3_SECRET_ACCESS_KEY}
        s3forcepathstyle: true
        insecure: true
        region: garage

  # Storage bucket configuration for S3 backend
  storage:
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: garage.garage.svc.cluster.local:3900
      accessKeyId: ${LOKI_S3_ACCESS_KEY_ID}
      secretAccessKey: ${LOKI_S3_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: true
      region: garage

  # Server configuration
  server:
    http_listen_port: 3100
    log_level: info
    log_format: json

# Deployment strategy - monolithic single pod
deploymentMode: SingleBinary

# Single pod replica
replicas: 1

# Image configuration
image:
  repository: grafana/loki
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  port: 3100
  targetPort: 3100

# Ingress configuration
ingress:
  enabled: false

# Persistence - 30GB Longhorn PVC for logs
persistence:
  enabled: true
  storageClassName: longhorn
  size: 30Gi
  accessModes:
    - ReadWriteMany

# Resource management
resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Pod disruption budget
podDisruptionBudget:
  minAvailable: 1

# Service monitoring for Prometheus
serviceMonitor:
  enabled: false

# Security context
podSecurityContext:
  fsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Single binary configuration
singleBinary:
  # Enable environment variable expansion in configuration
  extraArgs:
    - "-config.expand-env"
    - "true"
  # Environment variables from Kubernetes Secrets
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials

# Backend configuration for distributed/HA setup (optional future use)
backend:
  replicas: 1

# Read replicas for distributed setup (optional future use)
read:
  replicas: 1

# Write replicas for distributed setup (optional future use)
write:
  replicas: 1
