apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: phoenix-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: phoenix
  ingress:
    - fromEntities:
        - world
        - cluster
      toPorts:
        - ports:
            - port: "6006"
              protocol: TCP
            - port: "4317"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: phoenix-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: phoenix
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"

    # PostgreSQL (cross-namespace)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: postgres
            cnpg.io/cluster: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
