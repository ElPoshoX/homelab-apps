apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  labels:
    app: couchdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 5984
      initContainers:
        - name: copy-config
          image: busybox
          command:
            - sh
            - -c
            - cp /tmp/livesync-config/livesync.ini /opt/couchdb/etc/local.d/livesync.ini
          volumeMounts:
            - name: livesync-config-src
              mountPath: /tmp/livesync-config
            - name: local-config
              mountPath: /opt/couchdb/etc/local.d
      containers:
        - name: couchdb
          image: couchdb:3.5.1
          ports:
            - containerPort: 5984
              name: http
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: couchdb-admin
                  key: COUCHDB_USER
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchdb-admin
                  key: COUCHDB_PASSWORD
            - name: COUCHDB_SINGLE_NODE
              value: "true"
          volumeMounts:
            - name: couchdb-data
              mountPath: /opt/couchdb/data
            - name: local-config
              mountPath: /opt/couchdb/etc/local.d
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: couchdb-data
          persistentVolumeClaim:
            claimName: couchdb-data
        - name: livesync-config-src
          configMap:
            name: couchdb-livesync-config
        - name: local-config
          emptyDir: {}
