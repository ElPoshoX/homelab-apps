# Mimir Helm Chart Configuration
# Metrics storage backend for homelab observability stack
# Monolithic mode deployment with S3 backend

# Mimir monolithic mode - single pod deployment
mimir:
  structuredConfig:
    # Server configuration
    server:
      http_listen_port: 8009
      grpc_listen_port: 9009

    # Ingester configuration
    ingester: {}

    # Blocks storage configuration with S3 backend
    blocks_storage:
      backend: s3
      s3:
        endpoint: garage.garage.svc.cluster.local:3900
        bucket_name: mimir-bucket
        access_key_id: ${MIMIR_S3_ACCESS_KEY_ID}
        secret_access_key: ${MIMIR_S3_SECRET_ACCESS_KEY}
        insecure: true
      tsdb:
        dir: /mimir-data/tsdb

    # Compactor configuration
    compactor:
      data_dir: /mimir-data/compactor
      sharding_ring:
        kvstore:
          store: inmemory

    # Distributor configuration
    distributor:
      ring:
        kvstore:
          store: inmemory

    # Querier configuration
    querier:
      max_concurrent: 20

    # Limits configuration
    limits:
      max_global_series_per_user: 100000
      max_global_series_per_metric: 10000
      ingestion_rate: 100000
      ingestion_burst_size: 200000

    # Storage retention
    ruler_storage:
      backend: s3
      s3:
        endpoint: garage.garage.svc.cluster.local:3900
        bucket_name: mimir-bucket
        access_key_id: ${MIMIR_S3_ACCESS_KEY_ID}
        secret_access_key: ${MIMIR_S3_SECRET_ACCESS_KEY}
        insecure: true

# Deployment mode - monolithic
mimir-distributed:
  minio:
    enabled: false

  # Enable environment variable expansion for all components
  global:
    extraArgs:
      - "-config.expand-env"
      - "true"
    extraEnvFrom:
      - secretRef:
          name: mimir-s3-credentials

  compactor:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  distributor:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  ingester:
    enabled: true
    replicas: 1
    persistenceEnabled: true
    persistence:
      size: 50Gi
      storageClassName: longhorn
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  querier:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  query_frontend:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  ruler:
    enabled: false

  alertmanager:
    enabled: false

  store_gateway:
    enabled: true
    replicas: 1
    persistenceEnabled: true
    persistence:
      size: 10Gi
      storageClassName: longhorn
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
# Service configuration
service:
  type: ClusterIP
  port: 8009

# Ingress configuration
ingress:
  enabled: false

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 472
  fsGroup: 472

# Security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
