# Pyroscope Helm Chart Configuration
# Continuous profiling for homelab observability stack

# Pyroscope controller configuration
pyroscope:
  # Standalone mode - single pod deployment
  kind: StatefulSet
  replicaCount: 1

  # Resource requests and limits
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Service configuration
  service:
    type: ClusterIP
    port: 4040

  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: cilium
    hosts:
      - host: pyroscope.elposhox.dev
        paths:
          - path: /
            pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

  # Retention policy - 7 days
  retention: 168h

  # Persistence - 20GB Longhorn PVC for profiles
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 20Gi
    accessModes:
      - ReadWriteMany

  # Pod security context
  podSecurityContext:
    fsGroup: 101
    runAsUser: 101
    runAsNonRoot: true

  # Security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # Liveness and readiness probes
  livenessProbe:
    httpGet:
      path: /api/v1/healthz
      port: 4040
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/v1/healthz
      port: 4040
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3

# RBAC
rbac:
  create: true
  pspEnabled: false

# Service account
serviceAccount:
  create: true
  name: pyroscope

# Network policy
networkPolicy:
  enabled: false
