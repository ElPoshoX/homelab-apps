apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
  name: garage-secrets
  namespace: garage
spec:
  suspend: false
  secretTemplates:
    - name: garage-s3-credentials
      stringData:
        accessKey: ENC[AES256_GCM,data:PLACEHOLDER,iv:PLACEHOLDER,tag:PLACEHOLDER,type:str]
        secretKey: ENC[AES256_GCM,data:PLACEHOLDER,iv:PLACEHOLDER,tag:PLACEHOLDER,type:str]
    - name: garage-rpc-secret
      stringData:
        rpcSecret: ENC[AES256_GCM,data:PLACEHOLDER,iv:PLACEHOLDER,tag:PLACEHOLDER,type:str]
sops:
  age:
    - recipient: age1wtl5vlup8jkg5q3mwyed4mx5c8fsezqcd8lennp0qkreckfnupeswjlk3q
      enc: |
        -----BEGIN AGE ENCRYPTED FILE-----
        PLACEHOLDER
        -----END AGE ENCRYPTED FILE-----
  lastmodified: "2026-03-21T02:10:00Z"
  mac: ENC[AES256_GCM,data:PLACEHOLDER,iv:PLACEHOLDER,tag:PLACEHOLDER,type:str]
  encrypted_regex: ^(data|stringData)$
  version: 3.11.0
