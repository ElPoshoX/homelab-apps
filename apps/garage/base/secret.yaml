apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
  name: garage-secrets
  namespace: garage
spec:
  suspend: false
  secretTemplates:
    - name: garage-s3-credentials
      stringData:
        accessKey: garage
        secretKey: garage
    - name: garage-rpc-secret
      stringData:
        rpcSecret: GENERATE_STRONG_RPC_SECRET_HERE
