apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: aegis-exporter-ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: aegis-exporter
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: aegis-exporter-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: aegis-exporter
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"

    # Redis in aegis-gateway namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: aegis-gateway
            app.kubernetes.io/name: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
