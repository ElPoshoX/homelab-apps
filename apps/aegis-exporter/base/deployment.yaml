apiVersion: v1
kind: Service
metadata:
  name: aegis-exporter
  labels:
    app.kubernetes.io/name: aegis-exporter
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aegis-exporter
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-exporter
  labels:
    app.kubernetes.io/name: aegis-exporter
    app.kubernetes.io/component: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-exporter
        app.kubernetes.io/component: metrics
    spec:
      containers:
        - name: exporter
          image: ghcr.io/elposhox/aegis-exporter:latest
          ports:
            - containerPort: 9090
              name: metrics
          env:
            - name: REDIS_URL
              value: "redis://redis.aegis-gateway.svc.cluster.local:6379/0"
            - name: PORT
              value: "9090"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
