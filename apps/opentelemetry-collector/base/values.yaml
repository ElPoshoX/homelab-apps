# OpenTelemetry Collector Helm Chart Values
# Configuration for DaemonSet mode with no persistent storage

# Mode: daemonset (runs on all nodes)
mode: daemonset

# Image configuration
image:
  repository: otel/opentelemetry-collector-k8s
  pullPolicy: IfNotPresent

# DaemonSet specific settings
presets:
  kubeletMetrics:
    enabled: true
  hostMetrics:
    enabled: true

# OpenTelemetry Collector configuration
config:
  # Receivers - accept telemetry data
  receivers:
    # OTLP gRPC receiver (default port 4317)
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # Prometheus receiver (scrape metrics)
    prometheus:
      config:
        scrape_configs:
          - job_name: otel-collector
            static_configs:
              - targets:
                  - localhost:8888

    # Kubelet metrics receiver — preset handles endpoint/auth via K8S_NODE_IP
    kubeletstats:
      collection_interval: 30s
      resource_attributes:
        aws.volume.id:
          enabled: false
        fs.type:
          enabled: false
        gce.pd.name:
          enabled: false
        glusterfs.endpoints.name:
          enabled: false
        glusterfs.path:
          enabled: false
        partition:
          enabled: false

  # Processors - process telemetry data
  processors:
    # Batch processor for better throughput
    batch:
      send_batch_size: 1024
      timeout: 10s

    # Memory limiter to prevent out-of-memory
    memory_limiter:
      check_interval: 1s
      limit_mib: 400
      spike_limit_mib: 100

    # Convert delta temporality to cumulative (Claude Code sends delta, Mimir requires cumulative)
    deltatocumulative:

    # Normalize Claude Code OTEL labels to match backfilled data schema
    # OTEL sends type={input,output,cacheRead,cacheCreation}
    # Backfill uses token_type={input,output,cache_read,cache_create}
    transform/claude:
      metric_statements:
        - context: datapoint
          statements:
            - set(attributes["token_type"], attributes["type"]) where attributes["type"] != nil
            - replace_pattern(attributes["token_type"], "^cacheRead$", "cache_read")
            - replace_pattern(attributes["token_type"], "^cacheCreation$", "cache_create")
            - delete_key(attributes, "type") where attributes["token_type"] != nil

    # Normalize LiteLLM gen_ai.operation.name to OTEL semconv values
    # LiteLLM sends async call_type names; Phoenix expects standard names for span kind detection
    # Runs on all trace exporters (Tempo + Phoenix) — stores normalized values everywhere
    transform/litellm-normalize:
      trace_statements:
        - context: span
          statements:
            - replace_pattern(attributes["gen_ai.operation.name"], "^acompletion$", "chat")
            - replace_pattern(attributes["gen_ai.operation.name"], "^atext_completion$", "text_completion")

    # Attributes processor for adding metadata
    attributes:
      actions:
        - key: cluster.name
          value: homelab
          action: insert
        - key: deployment.environment
          value: homelab
          action: insert

    # Resource detection (no docker - cluster uses containerd)
    resourcedetection:
      detectors:
        - system
        - env

  # Exporters - send telemetry data to backends
  exporters:
    # OTLP exporter to Tempo (traces)
    otlp:
      endpoint: tempo.tempo.svc.cluster.local:4317
      tls:
        insecure: true

    # OTLP HTTP exporter to Mimir (metrics)
    otlphttp/mimir:
      endpoint: http://mimir-gateway.mimir.svc.cluster.local/otlp
      tls:
        insecure: true

    # OTLP HTTP exporter to Loki (logs)
    otlphttp/loki:
      endpoint: http://loki.loki.svc.cluster.local:3100/otlp
      tls:
        insecure: true

    # OTLP exporter to Phoenix (traces — LLM observability)
    otlp/phoenix:
      endpoint: phoenix-svc.phoenix.svc.cluster.local:4317
      tls:
        insecure: true
      headers:
        authorization: "Bearer ${env:PHOENIX_API_KEY}"

    # Debug exporter (replaces deprecated logging exporter)
    debug:
      verbosity: basic

  # Service - defines which processors and exporters are active
  service:
    pipelines:
      # Traces pipeline
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - resourcedetection
          - attributes
          - transform/litellm-normalize
          - batch
        exporters:
          - otlp
          - otlp/phoenix
          - debug

      # Metrics pipeline — hostmetrics/kubeletstats added by presets
      metrics:
        receivers:
          - otlp
          - prometheus
        processors:
          - memory_limiter
          - resourcedetection
          - attributes
          - transform/claude
          - deltatocumulative
          - batch
        exporters:
          - otlphttp/mimir
          - debug

      # Logs pipeline
      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - resourcedetection
          - attributes
          - batch
        exporters:
          - otlphttp/loki
          - debug

# Extra environment variables from Secrets
extraEnvs:
  - name: PHOENIX_API_KEY
    valueFrom:
      secretKeyRef:
        name: otel-collector-phoenix
        key: PHOENIX_API_KEY

# Resource requests and limits
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Security Context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Affinity - DaemonSet runs on all nodes
# Tolerations - allow DaemonSet to run on all nodes including tainted ones
tolerations:
  - operator: Exists

# Service Account
serviceAccount:
  create: true
  name: otel-collector

# Pod Annotations for monitoring
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"
  prometheus.io/path: "/metrics"

# Liveness probe
livenessProbe:
  httpGet:
    path: /healthz
    port: 13133
  initialDelaySeconds: 10
  periodSeconds: 10

# Readiness probe
readinessProbe:
  httpGet:
    path: /healthz
    port: 13133
  initialDelaySeconds: 5
  periodSeconds: 5

# Ingress for monitoring (optional)
ingress:
  enabled: false
  hosts:
    - paths:
        - path: /
          pathType: Prefix
          port: 4317
  tls:
    - secretName: otel-collector-tls
      hosts:
        - otel-collector.elposhox.dev

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Horizontal Pod Autoscaler (not applicable for DaemonSet)
autoscaling:
  enabled: false
