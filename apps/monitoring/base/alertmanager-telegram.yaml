apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: telegram
  namespace: monitoring
spec:
  route:
    receiver: telegram
    matchers:
      - name: severity
        matchType: "=~"
        value: ".*"
  receivers:
    - name: telegram
      webhookConfigs:
        - urlSecret:
            name: telegram-webhook-url
            key: url
          sendResolved: true
