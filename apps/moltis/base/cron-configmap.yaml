apiVersion: v1
kind: ConfigMap
metadata:
  name: moltis-cron-jobs
data:
  jobs.json: |
    [
      {
        "id": "daily-job-hunt",
        "name": "daily-job-hunt",
        "enabled": true,
        "deleteAfterRun": false,
        "schedule": { "kind": "cron", "expr": "0 4 * * *", "tz": "America/Mexico_City" },
        "payload": { "kind": "agentTurn", "message": "Run your Workflow steps in order:\n1. Load existing Job-Tracker entries from CouchDB (dedup)\n2. Search job boards for new Senior+ DevOps/SRE/Platform roles, remote LATAM-eligible\n3. Deduplicate against seen URLs and company names\n4. Use vault-write skill to persist each new job to 02-Areas/Career/Job-Tracker/{Company}.md\n\nEnd with a summary: how many new, how many skipped, and list the new ones with company + role.", "agentId": "de-job-hunter", "deliver": true },
        "sessionTarget": "isolated",
        "state": {},
        "sandbox": { "enabled": false },
        "wakeMode": "nextHeartbeat",
        "system": false,
        "createdAtMs": 1718000000000,
        "updatedAtMs": 1718000000000
      },
      {
        "id": "weekly-blog-generation",
        "name": "weekly-blog-generation",
        "enabled": true,
        "deleteAfterRun": false,
        "schedule": { "kind": "cron", "expr": "0 6 * * 6", "tz": "America/Mexico_City" },
        "payload": { "kind": "agentTurn", "message": "Generate weekly batch of 5 bilingual articles from Job Hunter skill tags.", "agentId": "de-blog-generator" },
        "sessionTarget": "isolated",
        "state": {},
        "sandbox": { "enabled": false },
        "wakeMode": "nextHeartbeat",
        "system": false,
        "createdAtMs": 1718000000000,
        "updatedAtMs": 1718000000000
      },
      {
        "id": "weekly-saas-scan",
        "name": "weekly-saas-scan",
        "enabled": true,
        "deleteAfterRun": false,
        "schedule": { "kind": "cron", "expr": "0 6 * * 0", "tz": "America/Mexico_City" },
        "payload": { "kind": "agentTurn", "message": "Scan for top 3 micro-SaaS opportunities in DevOps tooling space.", "agentId": "de-saas-finder" },
        "sessionTarget": "isolated",
        "state": {},
        "sandbox": { "enabled": false },
        "wakeMode": "nextHeartbeat",
        "system": false,
        "createdAtMs": 1718000000000,
        "updatedAtMs": 1718000000000
      }
    ]
