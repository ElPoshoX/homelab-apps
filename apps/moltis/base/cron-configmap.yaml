apiVersion: v1
kind: ConfigMap
metadata:
  name: moltis-cron-jobs
data:
  jobs.json: |
    [
      {
        "id": "daily-job-hunt",
        "name": "daily-job-hunt",
        "enabled": true,
        "deleteAfterRun": false,
        "schedule": { "kind": "cron", "expr": "0 4 * * *", "tz": "America/Mexico_City" },
        "payload": { "kind": "agentTurn", "message": "Run the daily job search. Follow all phases in your system prompt. Persist results with vault-write skill. End with summary report.", "agentId": "de-job-hunter", "deliver": true, "channel": "TheThothAIBot", "to": "6689299547" },
        "sessionTarget": "isolated",
        "state": {},
        "sandbox": { "enabled": true },
        "wakeMode": "nextHeartbeat",
        "system": false,
        "createdAtMs": 1718000000000,
        "updatedAtMs": 1718000000000
      },
      {
        "id": "weekly-blog-generation",
        "name": "weekly-blog-generation",
        "enabled": true,
        "deleteAfterRun": false,
        "schedule": { "kind": "cron", "expr": "0 6 * * 6", "tz": "America/Mexico_City" },
        "payload": { "kind": "agentTurn", "message": "Generate weekly batch of 5 bilingual articles from Job Hunter skill tags.", "agentId": "de-blog-generator" },
        "sessionTarget": "isolated",
        "state": {},
        "sandbox": { "enabled": false },
        "wakeMode": "nextHeartbeat",
        "system": false,
        "createdAtMs": 1718000000000,
        "updatedAtMs": 1718000000000
      },
      {
        "id": "weekly-saas-scan",
        "name": "weekly-saas-scan",
        "enabled": true,
        "deleteAfterRun": false,
        "schedule": { "kind": "cron", "expr": "0 6 * * 0", "tz": "America/Mexico_City" },
        "payload": { "kind": "agentTurn", "message": "Scan for top 3 micro-SaaS opportunities in DevOps tooling space.", "agentId": "de-saas-finder" },
        "sessionTarget": "isolated",
        "state": {},
        "sandbox": { "enabled": false },
        "wakeMode": "nextHeartbeat",
        "system": false,
        "createdAtMs": 1718000000000,
        "updatedAtMs": 1718000000000
      }
    ]
