apiVersion: v1
kind: Service
metadata:
  name: moltis
  labels:
    app.kubernetes.io/name: moltis
spec:
  selector:
    app: moltis
  ports:
    - name: gateway
      port: 13131
      targetPort: gateway
      protocol: TCP
    - name: http-ca
      port: 13132
      targetPort: http-ca
      protocol: TCP
    - name: oauth
      port: 1455
      targetPort: oauth
      protocol: TCP
