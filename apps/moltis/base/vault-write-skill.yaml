apiVersion: v1
kind: ConfigMap
metadata:
  name: moltis-vault-write-skill
data:
  vault-write.md: |
    ---
    name: vault-write
    description: Write agent output to Obsidian vault via CouchDB. Docs sync automatically via LiveSync.
    ---

    # Vault Write Skill — CouchDB + LiveSync

    Write agent output to the Obsidian vault via CouchDB. Documents sync to Obsidian via LiveSync (≤30s).

    ## Rules

    - NEVER create script files. Execute everything inline with `bash -c '...'`
    - NEVER export env vars — `COUCHDB_URL`, `COUCHDB_USER`, `COUCHDB_PASSWORD` are already in the environment
    - URL-encode slashes in doc paths: `agents/foo/bar.md` → `agents%2Ffoo%2Fbar.md` in the URL
    - Use `jq` for JSON construction (available in sandbox)
    - Each exec call should do ONE thing. Don't chain chunk+parent in one call

    ## Directory Convention

    Each agent writes to `agents/{agent-name}/`:
    - `agents/de-job-hunter/2026-06-10-results.md`
    - `agents/de-blog-generator/2026-06-10-cilium-draft.md`

    Use date-stamped filenames. Never overwrite previous runs.

    ## Complete Example — Create a Note

    ### Step 1: Compute chunk ID

    ```bash
    bash -c 'CONTENT="---
    dedup_key: \"my-key\"
    ---
    # My Title

    Content here."; BYTE_LEN=$(printf "%s" "$CONTENT" | wc -c | tr -d " "); CHUNK_ID="h:$(printf "%s" "${CONTENT}-${BYTE_LEN}" | sha256sum | cut -c1-16)"; echo "CHUNK_ID=$CHUNK_ID"; echo "BYTE_LEN=$BYTE_LEN"'
    ```

    Save the CHUNK_ID from the output for the next steps.

    ### Step 2: PUT chunk

    ```bash
    bash -c 'CHUNK_ID="h:REPLACE_ME"; CONTENT="---
    dedup_key: \"my-key\"
    ---
    # My Title

    Content here."; CHUNK_JSON=$(jq -n --arg id "$CHUNK_ID" --arg data "$CONTENT" "{_id: \$id, data: \$data, type: \"leaf\"}"); curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X PUT "$COUCHDB_URL/obsidian-vault/$CHUNK_ID" -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -H "Content-Type: application/json" -d "$CHUNK_JSON"'
    ```

    Expect HTTP 201.

    ### Step 3: PUT parent

    ```bash
    bash -c 'DOC_PATH="agents/my-agent/2026-06-11-test.md"; CHUNK_ID="h:REPLACE_ME"; NOW_MS=$(date +%s000); SIZE=REPLACE_BYTE_LEN; PARENT_JSON=$(jq -n --arg id "$DOC_PATH" --arg path "$DOC_PATH" --arg child "$CHUNK_ID" --argjson ctime "$NOW_MS" --argjson mtime "$NOW_MS" --argjson size "$SIZE" "{_id: \$id, path: \$path, children: [\$child], ctime: \$ctime, mtime: \$mtime, size: \$size, type: \"plain\", eden: {}}"); curl -s -w "\nHTTP_STATUS:%{http_code}\n" -X PUT "$COUCHDB_URL/obsidian-vault/$(echo $DOC_PATH | sed "s|/|%2F|g")" -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -H "Content-Type: application/json" -d "$PARENT_JSON"'
    ```

    Expect HTTP 201.

    ## Read a Note

    ```bash
    bash -c 'DOC_PATH="agents/my-agent/2026-06-11-test.md"; curl -s "$COUCHDB_URL/obsidian-vault/$(echo $DOC_PATH | sed "s|/|%2F|g")" -u "$COUCHDB_USER:$COUCHDB_PASSWORD"'
    ```

    ## Update a Note

    ```bash
    bash -c 'DOC_PATH="agents/my-agent/2026-06-11-test.md"; REV=$(curl -s "$COUCHDB_URL/obsidian-vault/$(echo $DOC_PATH | sed "s|/|%2F|g")" -u "$COUCHDB_USER:$COUCHDB_PASSWORD" | jq -r "._rev"); echo "REV=$REV"'
    ```

    Then PUT with `_rev` included in the parent JSON. Never PUT without `_rev` to an existing doc — CouchDB returns 409.

    ## List Agent Outputs

    ```bash
    bash -c 'curl -s -X POST "$COUCHDB_URL/obsidian-vault/_find" -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -H "Content-Type: application/json" -d "{\"selector\":{\"path\":{\"\$regex\":\"^agents/de-job-hunter/\"}},\"fields\":[\"path\",\"_id\"],\"limit\":1000}"'
    ```

    ## Conflict Handling

    - Prefer new documents over updating existing ones
    - Use date-stamped filenames: `2026-06-10-results.md`, `2026-06-11-results.md`
    - If PUT returns 409: GET for fresh `_rev`, retry once

    ## Dedup — Avoid Duplicate Output

    Every output document MUST include a `dedup_key` in YAML frontmatter:

    ```markdown
    ---
    dedup_key: "https://example.com/job/12345"
    ---
    # Sr SRE @ Datadog
    ...
    ```

    ### dedup_key Format Per Agent

    | Agent | dedup_key format | Example |
    |-------|-----------------|---------|
    | de-job-hunter | Canonical job URL | `https://linkedin.com/jobs/view/12345` |
    | de-job-hunter (secondary) | `company:title` | `datadog:senior-sre` |
    | de-blog-generator | Topic slug | `cilium-network-policies` |
    | de-saas-finder | Idea slug | `k8s-cost-optimizer` |

    ### Dedup Flow

    1. List existing docs in your `agents/{agent-name}/` directory (Mango query above)
    2. Fetch each doc's chunk → extract `dedup_key` from frontmatter
    3. Compare against new output's `dedup_key`
    4. Exact match → skip
    5. No match → write
