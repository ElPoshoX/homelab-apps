apiVersion: v1
kind: ConfigMap
metadata:
  name: moltis-vault-write-skill
data:
  vault-write.md: |
    ---
    name: vault-write
    description: Write agent output to Obsidian vault via CouchDB. Docs sync automatically via LiveSync.
    ---

    # Vault Write Skill — CouchDB + LiveSync

    Write agent output to the Obsidian vault via CouchDB. Documents sync to Obsidian via LiveSync (≤30s).

    ## Rules

    - NEVER use jq for JSON — use python3 only (jq double-escapes newlines)
    - NEVER use f-strings with escaped quotes in python3 — use string concatenation
    - NEVER use heredoc (`<< EOF`) — use triple-quoted strings inside python3
    - `COUCHDB_URL`, `COUCHDB_USER`, `COUCHDB_PASSWORD` are in the environment
    - Use `os.environ["VAR"]` to read them — no need to export
    - ALWAYS lowercase the `_id` field — LiveSync uses lowercase IDs. The `path` field keeps original case.

    ## Directory Convention

    Default: each agent writes to `agents/{agent-name}/` with date-stamped filenames.

    Exceptions (agent-specific paths):
    | Agent | Path | Filename |
    |-------|------|----------|
    | de-job-hunter | `02-Areas/Career/Job-Tracker/` | `{Company-Name}.md` |

    Never overwrite previous runs.

    ## One-Shot Write (Use This)

    Single exec, single python3 call. Copy-paste and replace doc_path + content.

    ```bash
    bash -c 'python3 << PYEOF
    import json, hashlib, urllib.request, urllib.parse, base64, os, time

    COUCHDB = os.environ["COUCHDB_URL"]
    USER = os.environ["COUCHDB_USER"]
    PASSWORD = os.environ["COUCHDB_PASSWORD"]
    AUTH = base64.b64encode((USER + ":" + PASSWORD).encode()).decode()
    HEADERS = {"Content-Type": "application/json", "Authorization": "Basic " + AUTH}

    doc_path = "agents/YOUR-AGENT-NAME/YYYY-MM-DD-title.md"
    content = """---
    dedup_key: "your-dedup-key"
    ---

    # Your Title

    Your content here.
    Multiple lines work fine.
    """

    byte_len = len(content.encode("utf-8"))
    chunk_hash = hashlib.sha256((content + "-" + str(byte_len)).encode("utf-8")).hexdigest()[:16]
    chunk_id = "h:" + chunk_hash

    chunk_doc = json.dumps({"_id": chunk_id, "data": content, "type": "leaf"})
    req1 = urllib.request.Request(COUCHDB + "/obsidian-vault/" + urllib.parse.quote(chunk_id, safe=""), data=chunk_doc.encode(), method="PUT", headers=HEADERS)
    r1 = urllib.request.urlopen(req1)
    print("Chunk: HTTP " + str(r1.status))

    now_ms = int(time.time() * 1000)
    doc_id = doc_path.lower()
    parent_doc = json.dumps({"_id": doc_id, "path": doc_path, "children": [chunk_id], "ctime": now_ms, "mtime": now_ms, "size": byte_len, "type": "plain", "eden": {}})
    req2 = urllib.request.Request(COUCHDB + "/obsidian-vault/" + urllib.parse.quote(doc_id, safe=""), data=parent_doc.encode(), method="PUT", headers=HEADERS)
    r2 = urllib.request.urlopen(req2)
    print("Parent: HTTP " + str(r2.status))
    print("Document: " + doc_path)
    PYEOF'
    ```

    Replace `doc_path`, `content`, and `dedup_key`. That's it.

    ## Read a Note

    ```bash
    bash -c 'curl -s "$COUCHDB_URL/obsidian-vault/$(echo "agents/my-agent/file.md" | sed "s|/|%2F|g")" -u "$COUCHDB_USER:$COUCHDB_PASSWORD"'
    ```

    ## Update a Note

    GET `_rev` first. Never PUT without `_rev` — CouchDB returns 409.

    ```bash
    bash -c 'DOC="agents/my-agent/file.md"; curl -s "$COUCHDB_URL/obsidian-vault/$(echo $DOC | sed s,/,%2F,g)" -u "$COUCHDB_USER:$COUCHDB_PASSWORD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get(\"_rev\",\"not found\"))"'
    ```

    Then use the One-Shot Write pattern but add `"_rev": "THE_REV"` to the parent_doc dict.

    ## List Docs in a Directory

    Replace the path regex with your target directory:
    ```bash
    bash -c 'curl -s -X POST "$COUCHDB_URL/obsidian-vault/_find" -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -H "Content-Type: application/json" -d "{\"selector\":{\"path\":{\"\$regex\":\"^YOUR/DIRECTORY/\"}},\"fields\":[\"path\",\"children\"],\"limit\":200}"'
    ```

    ## Dedup — Avoid Duplicate Output

    Every output MUST include a `dedup_key` in YAML frontmatter.

    | Agent | dedup_key format | Example |
    |-------|-----------------|---------|
    | de-job-hunter | Canonical job URL | `https://linkedin.com/jobs/view/12345` |
    | de-blog-generator | Topic slug | `cilium-network-policies` |
    | de-saas-finder | Idea slug | `k8s-cost-optimizer` |

    ### Dedup Flow
    1. List existing docs in your target directory
    2. Fetch chunks → extract `dedup_key` (or `Link` for Job-Tracker entries)
    3. Exact match → skip. No match → write.
