# Grafana Helm Chart Configuration
# Production-ready observability frontend for homelab stack

# Global configuration
replicas: 2
image:
  repository: grafana/grafana
  pullPolicy: IfNotPresent

# Admin user configuration
admin:
  existingSecret: grafana-admin-secret
  passwordKey: password

# Persistence configuration (20Gi Longhorn PVC)
persistence:
  enabled: true
  type: pvc
  storageClassName: longhorn
  size: 20Gi
  accessModes:
    - ReadWriteMany

# Service configuration
service:
  type: ClusterIP
  port: 3000

# Ingress configuration (disabled - using HTTPRoute instead)
ingress:
  enabled: false

# Gateway API HTTPRoute configuration
route:
  main:
    enabled: true
    hostnames:
      - grafana.elposhox.dev
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: homelab-gateway
        namespace: ingress

# --- Sidecar ---
# ConfigMap-based dashboard discovery across all namespaces
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
    labelValue: "1"
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true

# --- Dashboard Providers ---
# Define folder paths inside the Grafana container for organized dashboard loading
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: infrastructure
        orgId: 1
        folder: Infrastructure
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/infrastructure

# --- Dashboards ---
# Keys must match provider `name` fields above
dashboards:
  # dotdc/grafana-dashboards-kubernetes — loaded via raw GitHub URL (not gnetId)
  kubernetes:
    k8s-views-global:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-views-namespaces:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-namespaces.json
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-views-nodes:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-nodes.json
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-views-pods:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-system-api-server:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-api-server.json
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
    k8s-system-coredns:
      url: https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-system-coredns.json
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus
  # gnetId-based dashboards
  # NOTE: gnetId 22523 removed — it shares UID k8s_views_global with dotdc k8s-views-global,
  #       causing a UID collision that blocks both providers from writing.
  infrastructure:
    node-exporter:
      gnetId: 1860
      revision: 37
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

# Datasources configuration
# Prometheus stays explicitly defined since this is the standalone grafana chart (not kube-prometheus-stack)
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # Prometheus (Metrics)
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.prometheus.svc.cluster.local:80
        isDefault: true
        access: proxy
        editable: true
        jsonData:
          timeInterval: 15s
      # Loki (Logs)
      - name: Loki
        type: loki
        url: http://loki.loki.svc.cluster.local:3100
        access: proxy
        editable: true
      # Tempo (Traces) — httpMethod: GET and no gRPC; port 3200 speaks HTTP/1.1
      - name: Tempo
        type: tempo
        url: http://tempo.tempo.svc.cluster.local:3200
        access: proxy
        editable: true
        jsonData:
          httpMethod: GET
          tracesToMetrics:
            datasourceUid: 'prometheus'
          tracesToLogsV2:
            datasourceUid: 'loki'
          serviceMap:
            datasourceUid: 'prometheus'

# Resource requests and limits
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod security context
securityContext:
  runAsNonRoot: true
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Environment variables
env:
  GF_SECURITY_ADMIN_USER: admin
  GF_USERS_ALLOW_SIGN_UP: "false"
  GF_AUTH_DISABLE_LOGIN_FORM: "false"
  GF_FEATURE_TOGGLES_ENABLE: "nestedFolders,publicDashboards"

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

# Pod disruption budget for HA
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network policy (optional)
networkPolicy:
  enabled: false

# RBAC
rbac:
  pspEnabled: false
